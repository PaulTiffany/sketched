name: Deploy Real OmegaClaw Space

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "omegaclaw-space/**"
      - ".github/workflows/deploy-omegaclaw-space.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.HF_SPACE_ID != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Hugging Face client
        run: python -m pip install --disable-pip-version-check "huggingface_hub>=0.34,<2"
      - name: Create or update Docker Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          repo_id = os.environ["HF_SPACE_ID"]
          api = HfApi(token=token)
          api.create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              private=False,
              exist_ok=True,
          )
          api.upload_folder(
              repo_id=repo_id,
              repo_type="space",
              folder_path="omegaclaw-space",
              commit_message="Deploy Z0 real OmegaClaw runtime",
          )
          print(f"Deployed https://huggingface.co/spaces/{repo_id}")
          PY
