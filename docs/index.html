<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Z0 / Sketched</title>
<style>html,body{height:100%;margin:0;background:#050607;color:#f4f0e6;font:14px system-ui}main{height:100%;display:grid;place-items:center}p{opacity:.72}</style>
</head>
<body>
<main><p>Opening the Z0 body…</p></main>
<script>
(async()=>{
  const source='https://raw.githubusercontent.com/PaulTiffany/sketched/agent/sketched-html-body/z0.html';
  try{
    const response=await fetch(source,{cache:'no-store'});
    if(!response.ok) throw new Error('source '+response.status);
    const html=await response.text();
    document.open();
    document.write(html);
    document.close();
  }catch(error){
    document.body.innerHTML='<main><p>Could not open the Z0 body: '+String(error.message||error)+'</p></main>';
  }
})();
</script>
</body>
</html>
