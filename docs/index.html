<body>
<div id="app">
<section id="stage">
<header class="stage-head"><div class="brand">Z0</div><div class="modes"><button class="pill active" id="surfMode">SURF</button><button class="pill" id="streamMode">STREAM</button></div><div class="stage-state" id="stageState">surface ready</div><button class="setup-button" id="setupButton">Ω</button></header>
<div id="surf" class="active"><form class="urlbar" id="urlForm"><input id="urlInput" inputmode="url" autocomplete="url" placeholder="Paste any URL"><button class="mini" type="submit">go</button><button class="mini" type="button" id="readerToggle">reader</button></form><iframe id="browserFrame" title="Z0 browser" referrerpolicy="no-referrer" sandbox="allow-forms allow-modals allow-popups allow-popups-to-escape-sandbox allow-same-origin allow-scripts allow-downloads"></iframe><article id="reader" class="hidden"></article></div>
<div id="streamPane"><video id="streamVideo" playsinline muted autoplay></video><div class="stream-actions"><button id="cameraButton">camera</button><button id="screenButton">tab / screen</button><button id="stopStream">stop</button></div></div>
<canvas id="paint"></canvas><div class="badge" id="operatorBadge"></div>
</section>
<section id="commentary"><header class="chat-head"><strong>Omega</strong><span class="omega-state" id="omegaState">asleep</span><div class="quick"><button id="listenButton" disabled>listen</button><button class="make" id="makeButton" disabled>make</button></div></header><div id="messages"></div><div class="compose"><textarea id="chatInput" placeholder="Comment on what is above…"></textarea><button class="send" id="sendButton" disabled>send</button></div></section>
</div>
<section class="overlay" id="overlay"><header class="overlay-head"><strong>Omega body</strong><button id="closeSetup">close</button></header><div class="settings">
<div class="card runtime"><div class="eyebrow">runtime</div><div class="status"><span class="dot" id="omegaDot"></span><b id="omegaStatus">Omega is asleep</b></div><div class="actions"><button class="action primary" id="wakeButton">wake Omega</button><button class="action danger" id="sleepButton" hidden>sleep Omega</button></div></div>
<div class="card"><div class="eyebrow">OpenRouter</div><div class="status"><span class="dot" id="routerDot"></span><span class="muted" id="routerStatus">not connected</span></div><div class="actions"><button class="action primary" id="connectButton">connect</button><button class="action" id="refreshButton" disabled>refresh free models</button><button class="action danger" id="disconnectButton" hidden>disconnect</button></div><div class="muted" id="catalogStatus">Catalog not loaded.</div></div>
<div class="card"><b>Free model</b><select id="modelSelect" disabled><option>connect first</option></select><div class="mono" id="modelMeta">No free model selected.</div><div class="actions"><button class="action good" id="testButton" disabled>test model</button></div><div class="mono" id="testResult">No test yet.</div></div>
<div class="card"><b>Response</b><select id="tempoSelect"><option value="flash">flash — fast and sparse</option><option value="live">live — balanced</option><option value="compose">compose — Make only</option></select><select id="channelSelect"><option value="auto">auto — Omega chooses voice or notes</option><option value="voice">voice only</option><option value="notes">notes only</option><option value="both">voice, then notes</option><option value="silent">visual only</option></select><div class="mono" id="tempoMeta"></div></div>
<div class="card"><b>Presentation</b><div class="sizes"><button class="size" data-size="standard">standard</button><button class="size" data-size="large">large</button><button class="size" data-size="extra">extra</button></div><div class="actions"><button class="action" id="clearSurface">clear marks</button><button class="action" id="clearChat">clear chat</button></div></div>
</div></section>
<div class="toast" id="toast"></div>
<script>
(()=>{'use strict';
const $=s=>document.querySelector(s),STORE='z0.mobile-field.v1',ORIGIN=location.origin+location.pathname,PALETTE={amber:'#ffd078',violet:'#c8a8ff',white:'#f4f0e7',red:'#ff8585',green:'#82e7a2',blue:'#79aef7'},PROFILES={flash:{delay:700,maxTokens:800,maxVisual:6,maxSound:6,history:4,pageChars:6000,temperature:.16,timeout:18000},live:{delay:1500,maxTokens:1300,maxVisual:10,maxSound:10,history:8,pageChars:12000,temperature:.3,timeout:28000},compose:{delay:0,maxTokens:2000,maxVisual:14,maxSound:14,history:12,pageChars:20000,temperature:.42,timeout:38000}},canvas=$('#paint'),ctx=canvas.getContext('2d'),video=$('#streamVideo'),captureCanvas=document.createElement('canvas');
let state={key:null,model:'',messages:[],mode:'surf',url:'https://example.com',pageTitle:'',pageText:'',reader:false,tempo:'flash',channel:'auto',size:'large'},awake=false,worker=null,models=[],mediaStream=null,mediaKind='',recognition=null,listening=false,restartRecognition=false,speaking=false,busy=false,queued=null,voiceTimer=null,scene=null,sceneStart=0,audio=null,toastTimer=null;
function load(){try{state={...state,...JSON.parse(localStorage.getItem(STORE)||'{}')}}catch{}if(!PROFILES[state.tempo])state.tempo='flash';if(!['auto','voice','notes','both','silent'].includes(state.channel))state.channel='auto';document.documentElement.dataset.size=state.size;$('#urlInput').value=state.url||'';$('#tempoSelect').value=state.tempo;$('#channelSelect').value=state.channel;showTempo();setMode(state.mode||'surf',false);showReader(!!state.reader,false)}
function save(){localStorage.setItem(STORE,JSON.stringify(state))}function profile(){return PROFILES[state.tempo]||PROFILES.flash}
function toast(text,bad=false){clearTimeout(toastTimer);const e=$('#toast');e.textContent=text;e.style.borderColor=bad?'var(--danger)':'var(--human)';e.style.color=bad?'var(--danger)':'var(--human)';e.classList.add('show');toastTimer=setTimeout(()=>e.classList.remove('show'),3200)}
function showTempo(){const p=profile();$('#tempoMeta').textContent=`${p.delay?(p.delay/1000).toFixed(1)+'s speech pause':'manual Make'} · ${p.history} turns · ${p.maxVisual} marks · ${p.maxSound} notes`}
function clamp(v,a=0,b=1){v=Number(v);return Number.isFinite(v)?Math.min(b,Math.max(a,v)):a}function money(n){n=Number(n);if(!Number.isFinite(n))return'unknown';if(n===0)return'$0';if(n>=1)return'$'+n.toFixed(2);if(n>=.01)return'$'+n.toFixed(3);if(n>=.0001)return'$'+n.toFixed(4);return'$'+n.toExponential(2)}
function fit(){const r=$('#stage').getBoundingClientRect(),d=devicePixelRatio||1;canvas.width=Math.max(1,Math.floor(r.width*d));canvas.height=Math.max(1,Math.floor(r.height*d));ctx.setTransform(d,0,0,d,0,0)}
function setMode(mode,persist=true){state.mode=mode==='stream'?'stream':'surf';$('#surf').classList.toggle('active',state.mode==='surf');$('#streamPane').classList.toggle('active',state.mode==='stream');$('#surfMode').classList.toggle('active',state.mode==='surf');$('#streamMode').classList.toggle('active',state.mode==='stream');stageStatus();if(persist)save()}
function stageStatus(){if(state.mode==='surf')$('#stageState').textContent=state.pageTitle||state.url||'surf';else $('#stageState').textContent=mediaStream?(mediaKind==='screen'?'shared tab / screen':'camera'):'choose a stream'}
function showReader(on,persist=true){state.reader=on;$('#reader').classList.toggle('hidden',!on);$('#browserFrame').classList.toggle('hidden',on);$('#readerToggle').classList.toggle('active',on);$('#readerToggle').textContent=on?'live':'reader';if(persist)save()}
function normalizeUrl(raw){raw=String(raw||'').trim();if(!raw)return'';if(!/^https?:\/\//i.test(raw))raw='https://'+raw;try{return new URL(raw).href}catch{return''}}
async function loadUrl(raw){const url=normalizeUrl(raw);if(!url){toast('That URL is not valid.',true);return}state.url=url;state.pageTitle='';state.pageText='';$('#urlInput').value=url;$('#browserFrame').src=url;$('#reader').textContent='Reading '+url+' …';stageStatus();save();readUrl(url)}
async function readUrl(url){$('#stageState').textContent='reading page…';let text='',title='';try{const r=await fetch(url,{headers:{Accept:'text/html,text/plain'}});if(!r.ok)throw Error(String(r.status));const raw=await r.text(),doc=new DOMParser().parseFromString(raw,'text/html');title=doc.title||'';doc.querySelectorAll('script,style,noscript,svg').forEach(n=>n.remove());text=(doc.body?.innerText||raw).replace(/\n{3,}/g,'\n\n').trim()}catch{try{const r=await fetch('https://r.jina.ai/'+url,{headers:{Accept:'text/plain'}});if(!r.ok)throw Error(String(r.status));text=(await r.text()).trim();title=(text.match(/^Title:\s*(.+)$/m)||[])[1]||''}catch(e){text='';$('#reader').textContent='This page did not expose readable text. Keep the live page above, or switch to STREAM and share the tab visually.';$('#stageState').textContent='live page · no reader context';return}}state.pageTitle=title||new URL(url).hostname;state.pageText=text.slice(0,50000);$('#reader').textContent=state.pageText||'No readable text found.';stageStatus();save();toast('Page context ready.')}
function point(p,w,h){return[clamp(p?.[0])*w,clamp(p?.[1])*h]}function color(x){return PALETTE[x]||PALETTE.amber}
function drawScene(w,h,now){if(!scene)return;const t=(now-sceneStart)/1000;ctx.save();ctx.lineCap='round';ctx.lineJoin='round';for(const op of scene.visual){const q=clamp((t-op.delay)/op.duration);if(q<=0)continue;ctx.globalAlpha=op.opacity;ctx.lineWidth=op.width;ctx.strokeStyle=color(op.color);ctx.fillStyle=op.fill==='none'?'transparent':color(op.fill);if(op.type==='path'){const pts=op.points;if(pts.length<2)continue;const n=Math.max(2,Math.ceil(q*(pts.length-1))+1);ctx.beginPath();pts.slice(0,n).forEach((p,i)=>{const[x,y]=point(p,w,h);i?ctx.lineTo(x,y):ctx.moveTo(x,y)});if(op.closed&&q>=1)ctx.closePath();if(op.fill!=='none'&&q>=1)ctx.fill();ctx.stroke()}else if(op.type==='circle'){const[x,y]=point(op.center,w,h),r=op.radius*Math.min(w,h)*q;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);if(op.fill!=='none')ctx.fill();ctx.stroke()}else if(op.type==='arrow'){const a=point(op.from,w,h),b=point(op.to,w,h),x=a[0]+(b[0]-a[0])*q,y=a[1]+(b[1]-a[1])*q;ctx.beginPath();ctx.moveTo(a[0],a[1]);ctx.lineTo(x,y);ctx.stroke();if(q>.9){const ang=Math.atan2(b[1]-a[1],b[0]-a[0]),s=10+op.width*2;ctx.beginPath();ctx.moveTo(b[0],b[1]);ctx.lineTo(b[0]-s*Math.cos(ang-.45),b[1]-s*Math.sin(ang-.45));ctx.moveTo(b[0],b[1]);ctx.lineTo(b[0]-s*Math.cos(ang+.45),b[1]-s*Math.sin(ang+.45));ctx.stroke()}}else if(op.type==='label'){ctx.fillStyle=color(op.color);ctx.globalAlpha*=q;ctx.font=`700 ${Math.round(op.size*Math.min(w,h))}px ui-monospace,Consolas,monospace`;const[x,y]=point(op.at,w,h);ctx.fillText(op.text,x,y)}}ctx.restore()}
function paint(now){const r=$('#stage').getBoundingClientRect();ctx.clearRect(0,0,r.width,r.height);drawScene(r.width,r.height,now);requestAnimationFrame(paint)}
function validate(raw){const p=profile(),visual=[],sound=[];for(const x of Array.isArray(raw?.visual)?raw.visual.slice(0,p.maxVisual):[]){const type=String(x?.type||'');if(!['path','circle','arrow','label'].includes(type))continue;const b={type,color:PALETTE[x.color]?x.color:'amber',fill:PALETTE[x.fill]?x.fill:'none',width:clamp(x.width||4,1,18),opacity:clamp(x.opacity??1),delay:clamp(x.delay,0,8),duration:clamp(x.duration||1,.1,8)};if(type==='path'){b.points=(Array.isArray(x.points)?x.points:[]).slice(0,36).map(q=>[clamp(q?.[0]),clamp(q?.[1])]);if(b.points.length<2)continue;b.closed=!!x.closed}else if(type==='circle'){b.center=[clamp(x.center?.[0]),clamp(x.center?.[1])];b.radius=clamp(x.radius,.01,.5)}else if(type==='arrow'){b.from=[clamp(x.from?.[0]),clamp(x.from?.[1])];b.to=[clamp(x.to?.[0]),clamp(x.to?.[1])]}else{b.at=[clamp(x.at?.[0]),clamp(x.at?.[1])];b.text=String(x.text||'').slice(0,48);b.size=clamp(x.size||.035,.018,.08)}visual.push(b)}for(const n of Array.isArray(raw?.sound)?raw.sound.slice(0,p.maxSound):[])sound.push({note:Math.round(clamp(n.note,24,96)),start:clamp(n.start,0,10),duration:clamp(n.duration||.5,.05,5),velocity:clamp(n.velocity??.5,.02,.9),wave:['sine','triangle','square','sawtooth'].includes(n.wave)?n.wave:'sine'});return{reply:String(raw?.reply||'').slice(0,800),channel:['voice','notes','both','silent'].includes(raw?.channel)?raw.channel:'voice',operators:Array.isArray(raw?.operators)?raw.operators.map(String).slice(0,6):[],visual,sound}}
function playNotes(notes){if(!notes.length)return;audio=audio||new(window.AudioContext||window.webkitAudioContext)();audio.resume();const base=audio.currentTime+.04;for(const n of notes){const o=audio.createOscillator(),g=audio.createGain(),s=base+n.start,e=s+n.duration;o.type=n.wave;o.frequency.value=440*Math.pow(2,(n.note-69)/12);g.gain.setValueAtTime(.0001,s);g.gain.exponentialRampToValueAtTime(Math.max(.001,n.velocity*.16),s+.025);g.gain.exponentialRampToValueAtTime(.0001,e);o.connect(g).connect(audio.destination);o.start(s);o.stop(e+.04)}}
function resumeRecognition(){if(!listening||!recognition)return;restartRecognition=true;try{recognition.start()}catch{}}
function speak(text,done=()=>{}){if(!text||!('speechSynthesis'in window)){done();return}speechSynthesis.cancel();speaking=true;const was=listening;if(was){restartRecognition=false;try{recognition.stop()}catch{};$('#listenButton').textContent='speaking'}const u=new SpeechSynthesisUtterance(text);u.rate=1.03;u.pitch=.92;u.onend=u.onerror=()=>{speaking=false;done();if(was){$('#listenButton').textContent='listen';setTimeout(resumeRecognition,180)}};speechSynthesis.speak(u)}
function perform(p,elapsed){scene=p;sceneStart=performance.now();const mode=state.channel==='auto'?p.channel:state.channel,label=(p.operators.length?p.operators.join(' · '):'Omega')+` · ${mode} · ${(elapsed/1000).toFixed(1)}s`;$('#operatorBadge').textContent=label;$('#operatorBadge').classList.add('show');setTimeout(()=>$('#operatorBadge').classList.remove('show'),8500);if(mode==='voice')speak(p.reply);else if(mode==='notes')playNotes(p.sound);else if(mode==='both')speak(p.reply,()=>playNotes(p.sound))}
function workerCode(){let key='',model='';const wait=ms=>new Promise(r=>setTimeout(r,ms)),extract=s=>{s=String(s||'').trim().replace(/^```(?:json)?/i,'').replace(/```$/,'').trim();const a=s.indexOf('{'),b=s.lastIndexOf('}');return a>=0&&b>a?s.slice(a,b+1):s};const request=async(m,body,attempt=0)=>{const c=new AbortController(),timer=setTimeout(()=>c.abort(),m.profile.timeout);try{const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{method:'POST',signal:c.signal,headers:{Authorization:`Bearer ${key}`,'Content-Type':'application/json','HTTP-Referer':m.origin,'X-OpenRouter-Title':'Z0 Sketched'},body:JSON.stringify(body)}),d=await r.json().catch(()=>({}));if(!r.ok){const e=Error(d.error?.message||`HTTP ${r.status}`);e.status=r.status;e.retryAfter=Number(r.headers.get('Retry-After')||0);throw e}return d}catch(e){const transient=e.name==='AbortError'||[408,429,500,502,503,504].includes(e.status);if(transient&&attempt<1){postMessage({type:'status',value:'retrying'});await wait(Math.max(700,(e.retryAfter||0)*1000));return request(m,body,attempt+1)}if(e.name==='AbortError')throw Error('Free inference timed out. Try Flash or another free model.');throw e}finally{clearTimeout(timer)}};onmessage=async e=>{const m=e.data;if(m.type==='config'){key=m.key||'';model=m.model||'';return}if(m.type!=='infer')return;if(!key||!model){postMessage({type:'error',message:'Connect OpenRouter and select a free model.'});return}const started=Date.now();postMessage({type:'status',value:'thinking'});try{const body={model,temperature:m.profile.temperature,max_tokens:m.profile.maxTokens,messages:[{role:'system',content:m.system},...m.messages],reasoning:{effort:'none',exclude:true},response_format:{type:'json_object'},plugins:[{id:'response-healing'}],provider:{sort:'latency',allow_fallbacks:true,require_parameters:true,max_price:{prompt:0,completion:0,image:0}}};let d=await request(m,body),text=d.choices?.[0]?.message?.content||'',packet;try{packet=JSON.parse(extract(text))}catch{postMessage({type:'status',value:'repairing'});const repair={...body,temperature:0,max_tokens:900,messages:[{role:'system',content:'Repair this into exactly one valid compact JSON object with reply, channel, operators, visual, sound.'},{role:'user',content:text.slice(0,10000)}]};d=await request(m,repair);packet=JSON.parse(extract(d.choices?.[0]?.message?.content||''))}postMessage({type:'result',packet,served:d.model||model,usage:d.usage||null,elapsed:Date.now()-started})}catch(err){postMessage({type:'error',message:err.message})}finally{postMessage({type:'done'})}}}
function systemPrompt(frame){const p=profile(),horizon=state.mode==='surf'?`The upper pane is a web page. You receive its URL, title, and extracted readable text. You do not see its pixels unless an image is explicitly attached.`:frame?`The upper pane is a live stream and one current frame is attached. Describe only what is actually visible.`:`The upper pane is a live stream, but no frame is attached. You cannot see it.`;return `You are Omega inhabiting Z0. Output exactly one compact JSON object: {"reply":"brief response","channel":"voice","operators":["witness"],"visual":[],"sound":[]}.
${horizon}
Be concrete. Never claim to sense presence, intent, frequency, essence, or imagery not supplied. Avoid mystical filler.
Choose channel voice, notes, both, or silent. Prefer voice for conversation, notes for musical requests, both only when sequential voice then notes adds value.
Choose 1-5 operators from preserve, route, fracture, integrate, witness, exclude, return, differentiate, bind, release. Visual types are path, circle, arrow, label using normalized 0..1 coordinates and colors amber, violet, white, red, green, blue. Cyan is reserved for the human. Sound events use MIDI note 24..96, start, duration, velocity, and sine|triangle|square|sawtooth.
Current ${state.tempo} profile: at most ${p.maxVisual} visual operations and ${p.maxSound} notes. Keep reply under 28 words and JSON compact.`}
function add(kind,text){state.messages.push({kind,text:String(text),at:Date.now()});state.messages=state.messages.slice(-60);renderMessages();save()}
function renderMessages(){const b=$('#messages');b.innerHTML='';if(!state.messages.length){const d=document.createElement('div');d.className='msg system';d.textContent='Put something above. Wake Omega. Talk below.';b.append(d)}for(const m of state.messages){const d=document.createElement('div');d.className='msg '+m.kind;d.textContent=m.text;b.append(d)}b.scrollTop=b.scrollHeight}
function runtime(){const on=awake;$('#omegaDot').classList.toggle('on',on);$('#omegaStatus').textContent=busy?'Omega is working':on?'Omega is awake':'Omega is asleep';$('#omegaState').textContent=busy?'working':on?(state.key?'awake · free':'awake · no route'):'asleep';$('#wakeButton').hidden=on;$('#sleepButton').hidden=!on;$('#listenButton').disabled=!on;$('#makeButton').disabled=!on||busy;$('#sendButton').disabled=!on||busy;$('#setupButton').classList.toggle('awake',on)}
function wake(){if(awake)return;worker=new Worker(URL.createObjectURL(new Blob([`(${workerCode.toString()})()`],{type:'text/javascript'})));worker.onmessage=e=>{const m=e.data;if(m.type==='status'){if(m.value==='thinking')toast('Omega is thinking.');if(m.value==='retrying')toast('Trying another free route.');if(m.value==='repairing')toast('Repairing the performance.')}else if(m.type==='error'){add('system','Inference failed: '+friendly(m.message));toast(friendly(m.message),true)}else if(m.type==='result'){const p=validate(m.packet);if(p.reply)add('omega',p.reply);perform(p,m.elapsed||0);$('#testResult').textContent=`last served: ${m.served}\nlatency: ${((m.elapsed||0)/1000).toFixed(2)}s\ncost ceiling: $0`}else if(m.type==='done')finish()};worker.postMessage({type:'config',key:state.key,model:state.model});awake=true;runtime();add('system','Omega entered Z0.')}
function sleepOmega(){if(!awake)return;clearTimeout(voiceTimer);queued=null;busy=false;stopListening();speechSynthesis?.cancel();worker.terminate();worker=null;awake=false;runtime();add('system','Omega left Z0.')}
function friendly(x){x=String(x||'Unknown error');if(/user not found/i.test(x))return'OpenRouter could not resolve this key. Disconnect and reconnect.';if(/429|rate|quota/i.test(x))return'Free inference is rate-limited. Pause or choose another free model.';if(/503|no endpoints|provider/i.test(x))return'No free route is available. Refresh models or choose another.';if(/timeout/i.test(x))return'Free inference timed out. Try Flash or another free model.';return x}
function selectedModel(){return models.find(m=>m.id===state.model)}function seesImages(m){return m?.id==='openrouter/free'||(Array.isArray(m?.architecture?.input_modalities)&&m.architecture.input_modalities.includes('image'))}
function frame(){if(state.mode!=='stream'||!mediaStream||!video.videoWidth||!seesImages(selectedModel()))return null;const max=512,s=Math.min(1,max/video.videoWidth),w=Math.max(1,Math.round(video.videoWidth*s)),h=Math.max(1,Math.round(video.videoHeight*s));captureCanvas.width=w;captureCanvas.height=h;captureCanvas.getContext('2d').drawImage(video,0,0,w,h);return captureCanvas.toDataURL('image/jpeg',.72)}
function turnMessages(extra,image){const p=profile(),a=state.messages.filter(m=>m.kind==='human'||m.kind==='omega').slice(-p.history).map(m=>({role:m.kind==='human'?'user':'assistant',content:m.text}));let context=extra||'Respond to the current turn.';if(state.mode==='surf'){context+=`\n\nCURRENT PAGE\nURL: ${state.url||'none'}\nTITLE: ${state.pageTitle||'unknown'}\nREADABLE TEXT:\n${(state.pageText||'No extracted page text available.').slice(0,p.pageChars)}`}if(image)a.push({role:'user',content:[{type:'text',text:context+'\nA current stream frame is attached.'},{type:'image_url',image_url:{url:image}}]});else a.push({role:'user',content:context});return a}
function infer(extra,source='manual'){if(!awake){toast('Wake Omega first.',true);return}if(!state.key||!state.model){toast('Connect OpenRouter and select a free model.',true);openSetup();return}if(busy){queued={extra,source};toast('Newest turn queued.');return}busy=true;runtime();const image=frame();if(state.mode==='stream'&&mediaStream&&!image)toast('Selected model is TEXT ONLY; stream stays local.');if(image)toast('One current stream frame attached.');worker.postMessage({type:'infer',origin:location.origin,system:systemPrompt(!!image),messages:turnMessages(extra,image),profile:profile(),source})}
function finish(){busy=false;runtime();if(queued){const q=queued;queued=null;setTimeout(()=>infer(q.extra,q.source),120)}}
function send(){const i=$('#chatInput'),text=i.value.trim();if(!text)return;i.value='';add('human',text);infer('Respond to the latest human and interpret the upper pane.','chat')}
function make(){infer('MAKE: perform the strongest current correspondence between the conversation and the upper pane.','make')}
function scheduleVoice(){clearTimeout(voiceTimer);const p=profile();if(p.delay)voiceTimer=setTimeout(()=>infer('VOICE TURN: answer the newest spoken thought using the upper pane as context.','voice'),p.delay)}
async function startMedia(kind){stopMedia();try{if(kind==='screen'){if(!navigator.mediaDevices?.getDisplayMedia){toast('Tab or screen sharing is unavailable in this browser.',true);return}mediaStream=await navigator.mediaDevices.getDisplayMedia({video:true,audio:false})}else mediaStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});mediaKind=kind;video.srcObject=mediaStream;await video.play();mediaStream.getVideoTracks()[0].addEventListener('ended',stopMedia,{once:true});$('#cameraButton').classList.toggle('on',kind==='camera');$('#screenButton').classList.toggle('on',kind==='screen');setMode('stream');stageStatus();toast(seesImages(selectedModel())?'VISION active: one frame per turn.':'Stream active locally. Select VISION for Omega to see it.')}catch(e){mediaStream=null;toast(kind==='screen'?'Screen sharing was not started.':'Camera permission was not granted.',true)}}
function stopMedia(){if(mediaStream)mediaStream.getTracks().forEach(t=>t.stop());mediaStream=null;mediaKind='';video.srcObject=null;$('#cameraButton').classList.remove('on');$('#screenButton').classList.remove('on');stageStatus()}
function speechCtor(){return window.SpeechRecognition||window.webkitSpeechRecognition}function stopListening(){listening=false;restartRecognition=false;clearTimeout(voiceTimer);try{recognition?.stop()}catch{};$('#listenButton').classList.remove('on');$('#listenButton').textContent='listen'}
function toggleListen(){if(listening){stopListening();return}const C=speechCtor();if(!C){toast('Speech recognition is unavailable here. Type below.',true);return}recognition=new C();recognition.continuous=true;recognition.interimResults=true;recognition.lang='en-US';recognition.onresult=e=>{for(let i=e.resultIndex;i<e.results.length;i++){const text=e.results[i][0].transcript.trim();if(e.results[i].isFinal&&text){add('human','[voice] '+text);scheduleVoice()}}};recognition.onend=()=>{if(listening&&restartRecognition&&!speaking)setTimeout(resumeRecognition,120)};recognition.onerror=e=>{if(!['no-speech','aborted'].includes(e.error))toast('Speech recognition: '+e.error,true)};listening=true;restartRecognition=true;recognition.start();$('#listenButton').classList.add('on');$('#listenButton').textContent='listening'}
function openSetup(){$('#overlay').classList.add('open')}function closeSetup(){$('#overlay').classList.remove('open')}
async function connect(){const verifier=btoa(String.fromCharCode(...crypto.getRandomValues(new Uint8Array(64)))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,''),digest=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(verifier)),challenge=btoa(String.fromCharCode(...new Uint8Array(digest))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');sessionStorage.setItem('z0_pkce',verifier);location.href='https://openrouter.ai/auth?callback_url='+encodeURIComponent(ORIGIN)+'&code_challenge='+encodeURIComponent(challenge)+'&code_challenge_method=S256'}
async function oauth(){const q=new URLSearchParams(location.search),code=q.get('code'),verifier=sessionStorage.getItem('z0_pkce');if(!code||!verifier)return;history.replaceState({},'',location.pathname);const r=await fetch('https://openrouter.ai/api/v1/auth/keys',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,code_verifier:verifier,code_challenge_method:'S256'})});if(!r.ok)throw Error('OAuth exchange '+r.status);state.key=(await r.json()).key;sessionStorage.removeItem('z0_pkce');save()}
function routerUI(){const on=!!state.key;$('#routerDot').classList.toggle('on',on);$('#routerStatus').textContent=on?'connected · free only':'not connected';$('#connectButton').hidden=on;$('#disconnectButton').hidden=!on;$('#refreshButton').disabled=!on;if(!on){$('#modelSelect').disabled=true;$('#modelSelect').innerHTML='<option>connect first</option>';$('#testButton').disabled=true}runtime()}
async function api(url){const r=await fetch(url,{headers:{Authorization:`Bearer ${state.key}`,'HTTP-Referer':location.origin,'X-OpenRouter-Title':'Z0 Sketched'}});if(!r.ok)throw Error('Catalog '+r.status);return r.json()}function isFree(m){const p=m?.pricing||{},keys=['prompt','completion','request'];if(seesImages(m))keys.push('image');const nums=keys.map(k=>Number(p[k]||0));return(m?.id==='openrouter/free'||m?.id?.endsWith(':free')||nums.every(n=>n===0))&&nums.every(Number.isFinite)}function supportsJSON(m){return m?.id==='openrouter/free'||(Array.isArray(m?.supported_parameters)&&m.supported_parameters.includes('response_format'))}
async function refreshModels(){if(!state.key)return;$('#refreshButton').disabled=true;$('#catalogStatus').textContent='Finding free models…';try{const all=(await api('https://openrouter.ai/api/v1/models?output_modalities=text&supported_parameters=response_format&sort=latency-low-to-high')).data||[];models=all.filter(m=>isFree(m)&&supportsJSON(m));models.sort((a,b)=>a.id==='openrouter/free'?1:b.id==='openrouter/free'?-1:0);const s=$('#modelSelect');s.innerHTML='';models.forEach((m,i)=>{const o=document.createElement('option'),vision=seesImages(m)?(m.id==='openrouter/free'?'VISION ROUTER':'VISION'):'TEXT ONLY';o.value=m.id;o.textContent=`${m.name||m.id} · ${vision} · FREE${m.id==='openrouter/free'?' · variable':` · speed #${i+1}`}`;s.append(o)});state.model=models.some(m=>m.id===state.model)?state.model:(models.find(m=>m.id!=='openrouter/free')||models[0])?.id||'';s.value=state.model;s.disabled=!models.length;$('#testButton').disabled=!state.model;showModel();const v=models.filter(seesImages).length;$('#catalogStatus').textContent=models.length?`${v} vision · ${models.length-v} text only`:'No free compatible model is currently advertised.';worker?.postMessage({type:'config',key:state.key,model:state.model});save()}catch(e){$('#catalogStatus').textContent='Catalog failed: '+e.message;toast(e.message,true)}finally{$('#refreshButton').disabled=false}}
function showModel(){const i=models.findIndex(m=>m.id===state.model),m=models[i];if(!m){$('#modelMeta').textContent='No free model selected.';return}$('#modelMeta').textContent=`${m.id}\n${seesImages(m)?'VISION · accepts stream frames':'TEXT ONLY · streams remain local'}\nlatency position ${i+1} of ${models.length}\ncontext ${Number(m.context_length||0).toLocaleString()} tokens\ncost ceiling $0`}
async function testModel(){if(!state.key||!state.model)return;$('#testButton').disabled=true;$('#testResult').textContent='Testing…';const started=performance.now();try{const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{method:'POST',headers:{Authorization:`Bearer ${state.key}`,'Content-Type':'application/json','HTTP-Referer':location.origin,'X-OpenRouter-Title':'Z0 Sketched'},body:JSON.stringify({model:state.model,max_tokens:40,temperature:0,reasoning:{effort:'none',exclude:true},provider:{sort:'latency',allow_fallbacks:true,max_price:{prompt:0,completion:0,image:0}},messages:[{role:'user',content:'Reply exactly: Z0 free inference works.'}]})}),d=await r.json();if(!r.ok)throw Error(d.error?.message||`HTTP ${r.status}`);$('#testResult').textContent=`SUCCESS\nserved: ${d.model||'unknown'}\nlatency: ${((performance.now()-started)/1000).toFixed(2)}s\ncost ceiling $0`}catch(e){$('#testResult').textContent='FAILED\n'+friendly(e.message);toast(friendly(e.message),true)}finally{$('#testButton').disabled=false}}
async function init(){load();try{await oauth()}catch(e){toast(e.message,true)}routerUI();runtime();renderMessages();fit();paint(performance.now());document.querySelectorAll('.size').forEach(b=>b.classList.toggle('active',b.dataset.size===state.size));if(state.url){$('#browserFrame').src=state.url;if(state.pageText)$('#reader').textContent=state.pageText;else readUrl(state.url)}if(state.key)refreshModels()}
$('#surfMode').onclick=()=>setMode('surf');$('#streamMode').onclick=()=>setMode('stream');$('#urlForm').onsubmit=e=>{e.preventDefault();loadUrl($('#urlInput').value)};$('#readerToggle').onclick=()=>showReader(!state.reader);$('#cameraButton').onclick=()=>startMedia('camera');$('#screenButton').onclick=()=>startMedia('screen');$('#stopStream').onclick=stopMedia;$('#setupButton').onclick=openSetup;$('#closeSetup').onclick=closeSetup;$('#wakeButton').onclick=wake;$('#sleepButton').onclick=sleepOmega;$('#connectButton').onclick=connect;$('#disconnectButton').onclick=()=>{state.key=null;state.model='';models=[];worker?.postMessage({type:'config',key:'',model:''});routerUI();save()};$('#refreshButton').onclick=refreshModels;$('#modelSelect').onchange=e=>{state.model=e.target.value;showModel();worker?.postMessage({type:'config',key:state.key,model:state.model});save()};$('#testButton').onclick=testModel;$('#tempoSelect').onchange=e=>{state.tempo=e.target.value;showTempo();clearTimeout(voiceTimer);save()};$('#channelSelect').onchange=e=>{state.channel=e.target.value;speechSynthesis?.cancel();save()};$('#listenButton').onclick=toggleListen;$('#makeButton').onclick=make;$('#sendButton').onclick=send;$('#chatInput').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};$('#clearSurface').onclick=()=>{scene=null;$('#operatorBadge').classList.remove('show');toast('Marks cleared.')};$('#clearChat').onclick=()=>{state.messages=[];renderMessages();save()};document.querySelectorAll('.size').forEach(b=>b.onclick=()=>{state.size=b.dataset.size;document.documentElement.dataset.size=state.size;document.querySelectorAll('.size').forEach(x=>x.classList.toggle('active',x===b));save();fit()});window.onresize=fit;init();
})();
