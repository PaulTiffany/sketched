<!doctype html>
<html lang="en" data-size="large">
<head>

<title>Z0 / Sketched</title>
<style>
:root{--bg:#050607;--panel:#0d1115;--ink:#f4f0e7;--muted:#abb5be;--line:#3b4650;--human:#78e7f3;--agent:#ffd078;--danger:#ff8585;--dock:64px;font-size:18px;color-scheme:dark}
html[data-size="standard"]{font-size:16px}html[data-size="large"]{font-size:18px}html[data-size="extra"]{font-size:21px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{width:100%;height:100%;margin:0;overflow:hidden;overscroll-behavior:none;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;-webkit-text-size-adjust:100%}button,textarea{font:inherit;color:inherit}button{min-width:44px;min-height:44px;touch-action:manipulation}button:focus-visible,textarea:focus-visible{outline:3px solid var(--human);outline-offset:-3px}
.app,.surface{position:fixed;inset:0}.surface{background:#11161b;overflow:hidden}#canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}.top{position:fixed;z-index:10;left:0;right:0;top:0;display:flex;align-items:center;padding:calc(.65rem + env(safe-area-inset-top)) .72rem .7rem;background:linear-gradient(#050607e8,#05060700)}.brand{font:700 1rem Georgia,serif;pointer-events:none}.agent-button{margin-left:auto;border:1px solid #8b6d3a;border-radius:999px;background:#17130ee8;color:var(--agent);padding:.48rem .68rem;font:750 .74rem ui-monospace,Consolas,monospace}.agent-button small{color:#d1aa67;font-size:.78em}.hint{position:fixed;z-index:6;left:50%;top:13%;transform:translateX(-50%);max-width:86vw;text-align:center;color:#d7dce1;font:700 .84rem/1.45 ui-monospace,Consolas,monospace;text-shadow:0 2px 9px #000;pointer-events:none}.hint.hide{display:none}.toast{position:fixed;z-index:50;left:50%;bottom:calc(var(--dock) + env(safe-area-inset-bottom) + .6rem);transform:translateX(-50%);display:none;max-width:88vw;border:1px solid var(--human);border-radius:.6rem;background:#07090cf2;color:var(--human);padding:.58rem .7rem;text-align:center;font:700 .72rem/1.4 ui-monospace,Consolas,monospace}.toast.show{display:block}
.dock{position:fixed;z-index:40;left:0;right:0;bottom:0;height:calc(var(--dock) + env(safe-area-inset-bottom));display:grid;grid-template-columns:repeat(4,minmax(0,1fr));padding-bottom:env(safe-area-inset-bottom);background:#090c0f;border-top:1px solid var(--line)}.tool{width:100%;height:var(--dock);min-height:var(--dock);border:0;border-right:1px solid var(--line);border-radius:0;background:#11161b;display:flex;align-items:center;justify-content:center;gap:.36rem;font:750 .75rem/1 ui-monospace,Consolas,monospace}.tool:last-child{border-right:0}.tool .icon{font-size:1.22rem}.tool.on{background:#102126;color:var(--human)}.tool.make{color:var(--agent)}.tool.shake{color:var(--danger)}.tool:active{background:#20272e}
.panel{position:fixed;z-index:35;left:0;right:0;top:0;bottom:calc(var(--dock) + env(safe-area-inset-bottom));display:none;background:#0b0f13f7;backdrop-filter:blur(16px)}.panel.open{display:grid;grid-template-rows:auto auto 1fr}.panel-head{display:flex;align-items:center;padding:calc(.7rem + env(safe-area-inset-top)) .72rem .65rem;border-bottom:1px solid var(--line)}.panel-head strong{font:700 1rem Georgia,serif}.close{margin-left:auto;border:1px solid var(--line);border-radius:999px;background:#151a20;padding:.46rem .66rem;color:var(--muted);font:750 .72rem ui-monospace,Consolas,monospace}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:.42rem;padding:.65rem;border-bottom:1px solid #273039}.tab{border:1px solid var(--line);border-radius:999px;background:#151a20;color:var(--muted);padding:.58rem .4rem;font:750 .76rem ui-monospace,Consolas,monospace}.tab.active{border-color:var(--human);color:var(--human)}.pane{display:none;min-height:0;overflow:auto;padding:.72rem;-webkit-overflow-scrolling:touch}.pane.active{display:block}.agent-list,.setup{display:grid;gap:.58rem}.agent-card,.setting{display:flex;align-items:center;gap:.7rem;min-height:64px;border:1px solid var(--line);border-radius:.72rem;background:#12171c;padding:.7rem}.agent-card.active{border-color:#8b6d3a;background:#1a150e}.orb{width:2.55rem;height:2.55rem;flex:0 0 2.55rem;border:1px solid currentColor;border-radius:50%;display:grid;place-items:center;color:var(--agent);font:700 1.05rem Georgia,serif}.copy{min-width:0}.copy b{display:block;font-size:.96rem}.copy small{display:block;margin-top:.15rem;color:var(--muted);font-size:.8rem;line-height:1.35}.choose{margin-left:auto;border:1px solid #59636d;border-radius:999px;background:#171c22;padding:.5rem .62rem;font:750 .7rem ui-monospace,Consolas,monospace}.chat{display:flex;flex-direction:column;gap:.5rem;min-height:8rem;max-height:calc(100dvh - 15rem);overflow:auto;padding-bottom:.55rem}.msg{max-width:90%;border:1px solid var(--line);border-radius:.72rem;padding:.65rem .72rem;font-size:.92rem;line-height:1.5;white-space:pre-wrap}.msg.human{align-self:flex-end;border-color:#438894}.msg.agent{align-self:flex-start;border-color:#8b6d3a}.msg.system{align-self:center;color:var(--muted);font:650 .75rem/1.4 ui-monospace,Consolas,monospace}.compose{display:grid;grid-template-columns:1fr auto;gap:.5rem;position:sticky;bottom:0;background:var(--panel);padding-top:.5rem}.compose textarea{resize:none;height:3.6rem;background:#080b0e;border:1px solid var(--line);border-radius:.62rem;padding:.68rem;font-size:.96rem}.send{border:1px solid #8b6d3a;border-radius:.62rem;background:#1a150e;color:var(--agent);padding:0 .9rem;font-weight:750}.setting input{width:1.3rem;height:1.3rem;flex:0 0 1.3rem;accent-color:var(--human)}.sizebox{display:grid;gap:.5rem}.sizes{display:grid;grid-template-columns:repeat(3,1fr);gap:.4rem}.size{border:1px solid var(--line);border-radius:.58rem;background:#171c22;color:var(--muted);padding:.6rem .25rem;font-weight:750}.size.active{border-color:var(--human);color:var(--human)}.minor{display:flex;gap:.45rem;flex-wrap:wrap}.minor button{border:1px solid var(--line);border-radius:999px;background:#151a20;color:var(--muted);padding:.55rem .68rem;font:750 .7rem ui-monospace,Consolas,monospace}.history{list-style:none;padding:0;margin:.35rem 0 0}.history li{padding:.5rem 0;border-bottom:1px solid #293139;color:#c4ccd3;font:650 .7rem/1.4 ui-monospace,Consolas,monospace}
@media(max-width:380px){:root{font-size:17px;--dock:60px}.tool{gap:.24rem;font-size:.68rem}.tool .icon{font-size:1.12rem}}
@media(min-width:900px){.panel{left:50%;right:auto;width:min(720px,92vw);transform:translateX(-50%);border-inline:1px solid var(--line)}}
</style>
</head>
<body>
<div class="app">
<section class="surface"><canvas id="canvas"></canvas><video id="video" playsinline muted hidden></video><header class="top"><div class="brand">Z0 / Sketched</div><button class="agent-button" id="agentButton" aria-label="Open agent controls">Ω&nbsp; Omega <small>mock</small></button></header><div class="hint" id="hint">Turn on the camera or draw with your finger.</div><div class="toast" id="toast" role="status" aria-live="polite"></div></section>
<section class="panel" id="panel" aria-label="Agent controls"><div class="panel-head"><strong>Controls</strong><button class="close" id="close">close</button></div><div class="tabs" role="tablist"><button class="tab active" data-tab="agents">agents</button><button class="tab" data-tab="chat">chat</button><button class="tab" data-tab="setup">setup</button></div><div class="pane active" id="agents"><div class="agent-list" id="agentList"></div></div><div class="pane" id="chatPane"><div class="chat" id="chat"></div><div class="compose"><textarea id="input" aria-label="Message selected agent" placeholder="Tell the agent what to make…"></textarea><button class="send" id="send">send</button></div></div><div class="pane" id="setup"><div class="setup"><div class="setting sizebox"><div class="copy"><b>text size</b><small>Large is the default.</small></div><div class="sizes"><button class="size" data-size="standard">standard</button><button class="size" data-size="large">large</button><button class="size" data-size="extra">extra</button></div></div><label class="setting"><input id="behind" type="checkbox"><span class="copy"><b>put AI behind me</b><small>Best with a plain green background.</small></span></label><label class="setting"><input id="motion" type="checkbox"><span class="copy"><b>shake the phone</b><small>Clears only the selected agent.</small></span></label><div class="setting"><span class="copy"><b>connection</b><small>Sponsored inference is not connected yet; this uses a visible local mock.</small></span></div><div class="minor"><button id="snapshot">snapshot</button><button id="clearHuman">clear my drawing</button><button id="historyBtn">history</button></div><ol class="history" id="history" hidden></ol></div></div></section>
<nav class="dock" aria-label="Primary tools"><button class="tool" id="camera" aria-pressed="false"><span class="icon">◉</span><span>camera</span></button><button class="tool on" id="draw" aria-pressed="true"><span class="icon">✎</span><span>draw</span></button><button class="tool make" id="make"><span class="icon">✦</span><span>make</span></button><button class="tool shake" id="shake"><span class="icon">↯</span><span>shake</span></button></nav>
</div>
<script>
(()=>{'use strict';
const KEY='z0.mobile.v6',$=s=>document.querySelector(s),canvas=$('#canvas'),ctx=canvas.getContext('2d',{willReadFrequently:true}),video=$('#video'),buffer=document.createElement('canvas'),bctx=buffer.getContext('2d',{willReadFrequently:true});let S=load(),line=null,drawing=true,stream=null,behind=false,timer=null,motion=false,lastMotion=0;
function seed(){return{size:'large',selected:'omega',agents:[{id:'omega',name:'Omega',glyph:'Ω',role:'witnesses and interprets',color:'#ffd078'},{id:'synth',name:'Synth',glyph:'S',role:'builds a coherent scene',color:'#c7a6ff'},{id:'challenge',name:'Challenger',glyph:'!',role:'adds contrast and tests it',color:'#ff9292'}],events:[]}}function load(){try{return Object.assign(seed(),JSON.parse(localStorage.getItem(KEY)||'{}'))}catch{return seed()}}function save(){localStorage.setItem(KEY,JSON.stringify(S))}function current(){return S.agents.find(a=>a.id===S.selected)||S.agents[0]}function add(kind,actor,payload){S.events.push({id:crypto.randomUUID(),kind,actor,payload,at:new Date().toISOString()});save();ui()}function live(){const gone=new Set();for(const e of S.events){if(e.kind==='shake')for(const x of S.events)if(x.kind==='mark'&&x.actor===e.payload.agent)gone.add(x.id);if(e.kind==='clear-human')for(const x of S.events)if(x.kind==='mark'&&x.actor==='human')gone.add(x.id)}return S.events.filter(e=>e.kind==='mark'&&!gone.has(e.id))}function toast(t,bad=false){clearTimeout(timer);const x=$('#toast');x.textContent=t;x.style.borderColor=bad?'var(--danger)':'var(--human)';x.style.color=bad?'var(--danger)':'var(--human)';x.classList.add('show');timer=setTimeout(()=>x.classList.remove('show'),2400)}function fit(){const r=canvas.getBoundingClientRect(),d=devicePixelRatio||1;canvas.width=Math.max(1,Math.floor(r.width*d));canvas.height=Math.max(1,Math.floor(r.height*d));ctx.setTransform(d,0,0,d,0,0)}
function scene(p,w,h){const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,p.sky);g.addColorStop(1,p.ground);ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.fillStyle=p.sun;ctx.beginPath();ctx.arc(.72*w,.22*h,Math.min(w,h)*.075,0,Math.PI*2);ctx.fill();ctx.fillStyle=p.ground;ctx.fillRect(0,.68*h,w,h)}function mark(e,w,h){const p=e.payload,scale=S.size==='extra'?1.25:S.size==='standard'?.95:1.1;ctx.save();ctx.strokeStyle=p.color||'#fff';ctx.fillStyle=p.color||'#fff';ctx.lineWidth=3;ctx.lineCap='round';ctx.lineJoin='round';if(p.type==='stroke'){ctx.beginPath();p.points.forEach(([x,y],i)=>i?ctx.lineTo(x*w,y*h):ctx.moveTo(x*w,y*h));ctx.stroke()}else if(p.type==='text'){ctx.font=`600 ${17*scale}px ui-monospace,Consolas,monospace`;ctx.fillText(p.text,p.x*w,p.y*h)}ctx.restore()}function cameraLayer(w,h){if(!stream||!video.videoWidth)return;const bw=Math.min(640,Math.floor(w)),bh=Math.max(1,Math.floor(bw*h/w));if(buffer.width!==bw||buffer.height!==bh){buffer.width=bw;buffer.height=bh}bctx.clearRect(0,0,bw,bh);bctx.drawImage(video,0,0,bw,bh);if(behind){const im=bctx.getImageData(0,0,bw,bh),d=im.data;for(let i=0;i<d.length;i+=4){const r=d[i],g=d[i+1],b=d[i+2];if(g>72&&g>r*1.2&&g>b*1.16)d[i+3]=Math.max(0,255-(g-Math.max(r,b))*4)}bctx.putImageData(im,0,0)}ctx.drawImage(buffer,0,0,w,h)}function paint(){const w=canvas.clientWidth,h=canvas.clientHeight,m=live();ctx.clearRect(0,0,w,h);ctx.fillStyle='#11161b';ctx.fillRect(0,0,w,h);for(const e of m)if(e.payload.type==='scene')scene(e.payload.scene,w,h);for(const e of m)if(e.actor!=='human'&&e.payload.type!=='scene'&&e.payload.plane==='back')mark(e,w,h);cameraLayer(w,h);for(const e of m)if(e.actor==='human')mark(e,w,h);for(const e of m)if(e.actor!=='human'&&e.payload.plane==='front')mark(e,w,h);if(line)mark({payload:{type:'stroke',points:line,color:'#78e7f3'}},w,h);requestAnimationFrame(paint)}function point(e){const r=canvas.getBoundingClientRect();return[(e.clientX-r.left)/r.width,(e.clientY-r.top)/r.height]}canvas.onpointerdown=e=>{if(!drawing||$('#panel').classList.contains('open'))return;canvas.setPointerCapture(e.pointerId);line=[point(e)];$('#hint').classList.add('hide')};canvas.onpointermove=e=>{if(line)line.push(point(e))};canvas.onpointerup=()=>{if(line&&line.length>1)add('mark','human',{type:'stroke',points:line,color:'#78e7f3',plane:'human'});line=null};canvas.onpointercancel=()=>line=null;
function agentList(){const box=$('#agentList');box.innerHTML='';for(const a of S.agents){const d=document.createElement('div');d.className='agent-card'+(a.id===S.selected?' active':'');d.innerHTML=`<div class="orb" style="color:${a.color}">${a.glyph}</div><div class="copy"><b>${a.name}</b><small>${a.role}</small></div><button class="choose">${a.id===S.selected?'selected':'choose'}</button>`;d.querySelector('button').onclick=()=>{S.selected=a.id;save();ui();closePanel()};box.append(d)}}function messages(){const box=$('#chat');box.innerHTML='';const msgs=S.events.filter(e=>e.kind==='chat');if(!msgs.length){const d=document.createElement('div');d.className='msg system';d.textContent='Choose an agent, tap Make, or send a sentence.';box.append(d)}for(const e of msgs.slice(-60)){const d=document.createElement('div');d.className='msg '+(e.actor==='human'?'human':'agent');d.textContent=e.payload.text;box.append(d)}box.scrollTop=box.scrollHeight}function history(){const box=$('#history');box.innerHTML='';for(const e of S.events.slice(-60).reverse()){const li=document.createElement('li');li.textContent=`${e.kind} · ${e.actor} · ${new Date(e.at).toLocaleTimeString()}`;box.append(li)}}function applySize(){if(!['standard','large','extra'].includes(S.size))S.size='large';document.documentElement.dataset.size=S.size;document.querySelectorAll('.size').forEach(b=>b.classList.toggle('active',b.dataset.size===S.size))}function ui(){applySize();const a=current();$('#agentButton').innerHTML=`${a.glyph}&nbsp; ${a.name} <small>mock</small>`;$('#camera').classList.toggle('on',!!stream);$('#camera').setAttribute('aria-pressed',String(!!stream));$('#draw').classList.toggle('on',drawing);$('#draw').setAttribute('aria-pressed',String(drawing));$('#behind').checked=behind;agentList();messages();history()}
function setTab(name){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('active',p.id===(name==='chat'?'chatPane':name)))}function openPanel(){$('#panel').classList.add('open')}function closePanel(){$('#panel').classList.remove('open')}function shake(source='button'){const a=current();add('shake','human',{agent:a.id,source});toast(`${a.name} cleared. Camera, your drawing, and other agents remain.`)}function mock(a,prompt){const n=S.events.filter(e=>e.kind==='mark'&&e.actor===a.id).length,q=prompt.toLowerCase(),p=q.includes('forest')?{sky:'#10251f',ground:'#172219',sun:'#e7d89a'}:q.includes('space')?{sky:'#060816',ground:'#141027',sun:'#d6c7ff'}:q.includes('desert')?{sky:'#583522',ground:'#43261a',sun:'#ffd078'}:{sky:n%2?'#1d1b31':'#132431',ground:n%2?'#281728':'#19221d',sun:a.color};return{say:`${a.name}: I changed only my scene. Shake me to remove it.`,scene:p,text:prompt||'one turn'}}function make(prompt=''){const a=current();if(prompt)add('chat','human',{text:prompt});const out=mock(a,prompt);add('chat',a.id,{text:out.say});add('mark',a.id,{type:'scene',scene:out.scene,plane:'back'});add('mark',a.id,{type:'text',text:`${a.name} · ${out.text}`.slice(0,54),x:.55,y:.24+(S.events.length*.07)%0.5,color:a.color,plane:'front'})}
$('#camera').onclick=async()=>{if(stream){stream.getTracks().forEach(t=>t.stop());stream=null;video.srcObject=null;add('camera','human',{on:false});return}try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});video.srcObject=stream;await video.play();add('camera','human',{on:true});$('#hint').classList.add('hide')}catch{toast('Camera permission was not granted.',true)}};$('#draw').onclick=()=>{drawing=!drawing;ui();toast(drawing?'Draw with your finger.':'Drawing paused.')};$('#make').onclick=()=>make();$('#shake').onclick=()=>shake();$('#agentButton').onclick=openPanel;$('#close').onclick=closePanel;document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));document.querySelectorAll('.size').forEach(b=>b.onclick=()=>{S.size=b.dataset.size;save();applySize();fit();toast(`Text size: ${b.textContent}.`)});$('#send').onclick=()=>{const i=$('#input'),t=i.value.trim();if(!t)return;i.value='';make(t)};$('#input').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();$('#send').click()}};$('#behind').onchange=e=>{behind=e.target.checked;add('camera-mode','human',{behind});toast(behind?'AI can appear behind you with a plain green background.':'Camera returned to normal.')};$('#motion').onchange=async e=>{try{if(e.target.checked&&typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){if(await DeviceMotionEvent.requestPermission()!=='granted')throw Error()}motion=e.target.checked;if(motion)window.addEventListener('devicemotion',move);else window.removeEventListener('devicemotion',move)}catch{e.target.checked=false;toast('Phone motion permission was unavailable.',true)}};function move(e){if(!motion)return;const a=e.accelerationIncludingGravity;if(!a)return;const m=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2),t=Date.now();if(m>22&&t-lastMotion>1800){lastMotion=t;shake('physical')}}$('#snapshot').onclick=()=>{const a=document.createElement('a');a.href=canvas.toDataURL('image/jpeg',.82);a.download=`z0-${Date.now()}.jpg`;a.click()};$('#clearHuman').onclick=()=>{add('clear-human','human',{});toast('Your drawing was cleared. Agent scenes remain.')};$('#historyBtn').onclick=()=>{$('#history').hidden=!$('#history').hidden};window.onresize=fit;applySize();fit();paint();ui();if(!S.events.length)add('surface','human',{invariant:'human persists; agents shake separately'});
})();
</script>
</body>
