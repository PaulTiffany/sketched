<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#050607">
<title>Z0 / Sketched</title>
<style>
:root{--bg:#050607;--ink:#f4f0e7;--muted:#8f9aa5;--line:#303840;--human:#6fe2f0;--agent:#ffc468;--danger:#ff7474;--panel:#101419}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif}
button,input,textarea{font:inherit}button{color:inherit}.app{position:fixed;inset:0;background:#050607}.stage{position:absolute;inset:0;background:#11161b;overflow:hidden}#stage{position:absolute;inset:0;width:100%;height:100%;touch-action:none}.top{position:absolute;z-index:8;left:0;right:0;top:0;display:flex;align-items:center;gap:.45rem;padding:calc(.55rem + env(safe-area-inset-top)) .65rem .45rem;background:linear-gradient(#050607d9,#05060700);pointer-events:none}.brand{font:700 .9rem Georgia,serif}.status{margin-left:auto;border:1px solid #2e3740;border-radius:999px;padding:.35rem .52rem;background:#0a0d10c7;color:var(--muted);font:700 .59rem ui-monospace,Consolas,monospace}.agent-now{color:var(--agent)}
.hint{position:absolute;z-index:7;left:50%;top:12%;transform:translateX(-50%);max-width:82vw;text-align:center;color:#c5cbd1;font:700 .7rem/1.4 ui-monospace,Consolas,monospace;text-shadow:0 2px 8px #000;opacity:.85;pointer-events:none;transition:.25s}.hint.hide{opacity:0}.receipt{position:absolute;z-index:20;left:50%;bottom:calc(7.25rem + env(safe-area-inset-bottom));transform:translate(-50%,12px);opacity:0;transition:.2s;background:#07090cea;border:1px solid var(--human);color:var(--human);border-radius:.55rem;padding:.52rem .65rem;max-width:86vw;text-align:center;font:700 .63rem/1.35 ui-monospace,Consolas,monospace;pointer-events:none}.receipt.show{opacity:1;transform:translate(-50%,0)}
.agent-strip{position:absolute;z-index:12;left:50%;bottom:calc(5.85rem + env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;align-items:center;gap:.45rem}.agent-pill{border:1px solid #6f5834;background:#17130d;color:var(--agent);border-radius:999px;padding:.42rem .7rem;font:700 .67rem ui-monospace,Consolas,monospace;box-shadow:0 8px 24px #0008}.agent-pill small{color:#b99558}.agent-pill:active{transform:scale(.97)}
.dock{position:absolute;z-index:14;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(4,1fr);gap:.42rem;padding:.55rem .6rem calc(.6rem + env(safe-area-inset-bottom));background:linear-gradient(#05060700,#050607 28%)}.tool{height:4.6rem;border:1px solid #303840;border-radius:1rem;background:#12171cde;display:grid;place-items:center;align-content:center;gap:.22rem;box-shadow:0 8px 30px #0009;font:700 .65rem ui-monospace,Consolas,monospace}.tool .icon{font-size:1.35rem;line-height:1}.tool.on{border-color:var(--human);color:var(--human);box-shadow:inset 0 0 0 1px #6fe2f033,0 8px 30px #0009}.tool.make{border-color:#6f5834;color:var(--agent)}.tool.shake{border-color:#713b3b;color:var(--danger)}.tool:active{transform:translateY(2px) scale(.98)}
.sheet-handle{position:absolute;z-index:16;left:50%;bottom:calc(5.35rem + env(safe-area-inset-bottom));transform:translateX(-50%);width:4.4rem;height:1.15rem;border:1px solid #303840;border-bottom:0;border-radius:.7rem .7rem 0 0;background:#0e1216;display:grid;place-items:center;color:#7f8a94;font-size:1rem}.sheet{position:absolute;z-index:15;left:0;right:0;bottom:0;height:min(52dvh,460px);background:#0d1115f7;border-top:1px solid #303840;border-radius:1rem 1rem 0 0;box-shadow:0 -20px 70px #000b;transform:translateY(calc(100% - 5.2rem - env(safe-area-inset-bottom)));transition:transform .24s ease;display:grid;grid-template-rows:auto 1fr;padding-bottom:calc(5.25rem + env(safe-area-inset-bottom));backdrop-filter:blur(18px)}.sheet.open{transform:translateY(0)}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:.35rem;padding:.72rem .65rem .55rem}.tab{border:1px solid #303840;border-radius:999px;background:#14191f;padding:.48rem;color:var(--muted);font:700 .65rem ui-monospace,Consolas,monospace}.tab.active{color:var(--human);border-color:#397985}.pane{display:none;min-height:0;overflow:auto;padding:.35rem .75rem .75rem}.pane.active{display:block}.agent-list{display:grid;gap:.5rem}.agent-card{display:flex;align-items:center;gap:.6rem;border:1px solid #303840;border-radius:.7rem;background:#12171c;padding:.68rem}.agent-card.active{border-color:#806536;background:#17130e}.agent-orb{width:2.2rem;height:2.2rem;border-radius:50%;display:grid;place-items:center;border:1px solid currentColor;color:var(--agent);font:700 1rem Georgia,serif}.agent-copy{min-width:0}.agent-copy b{display:block}.agent-copy small{display:block;color:var(--muted);font-size:.72rem}.pick{margin-left:auto;border:1px solid #4a535c;border-radius:999px;background:#171c22;padding:.4rem .55rem;font:700 .6rem ui-monospace,Consolas,monospace}.chat-stream{display:flex;flex-direction:column;gap:.45rem;min-height:8rem;max-height:18rem;overflow:auto;padding-bottom:.5rem}.msg{max-width:88%;border:1px solid #303840;border-radius:.65rem;padding:.52rem .6rem;font-size:.8rem;line-height:1.4;white-space:pre-wrap}.msg.human{align-self:flex-end;border-color:#397985;background:#6fe2f00d}.msg.agent{align-self:flex-start;border-color:#806536;background:#ffc4680d}.msg.system{align-self:center;color:var(--muted);font:600 .63rem ui-monospace,Consolas,monospace;background:transparent}.compose{display:grid;grid-template-columns:1fr auto;gap:.45rem}.compose textarea{resize:none;height:3.1rem;background:#080b0e;color:var(--ink);border:1px solid #303840;border-radius:.55rem;padding:.58rem}.send{border:1px solid #806536;border-radius:.55rem;background:#17130d;color:var(--agent);padding:0 .8rem;font-weight:700}.setup{display:grid;gap:.6rem}.setting{display:flex;align-items:center;gap:.6rem;border:1px solid #303840;border-radius:.65rem;background:#12171c;padding:.7rem}.setting input{width:1.15rem;height:1.15rem;accent-color:var(--human)}.setting-copy b{display:block}.setting-copy small{display:block;color:var(--muted);font-size:.71rem;line-height:1.35}.minirow{display:flex;gap:.45rem;flex-wrap:wrap}.mini{border:1px solid #303840;border-radius:999px;background:#14191f;padding:.45rem .62rem;color:var(--muted);font:700 .61rem ui-monospace,Consolas,monospace}.history{list-style:none;padding:0;margin:0}.history li{padding:.42rem 0;border-bottom:1px solid #242b32;font:600 .61rem ui-monospace,Consolas,monospace;color:#b6bec6}
@media(min-width:900px){.dock{left:50%;right:auto;width:min(620px,70vw);transform:translateX(-50%)}.sheet{left:50%;right:auto;width:min(680px,92vw);transform:translate(-50%,calc(100% - 5.2rem));}.sheet.open{transform:translate(-50%,0)}.sheet-handle{bottom:5.35rem}.agent-strip{bottom:5.85rem}}
</style>
</head>
<body>
<div class="app">
  <section class="stage">
    <canvas id="stage"></canvas><video id="video" playsinline muted hidden></video>
    <header class="top"><div class="brand">Z0 / Sketched</div><div class="status"><span class="agent-now" id="agentNow">Omega</span> · <span id="modeNow">mock</span></div></header>
    <div class="hint" id="hint">Turn on the camera or draw with your finger.</div>
    <div class="receipt" id="receipt"></div>
  </section>
  <div class="agent-strip"><button class="agent-pill" id="agentPill">Ω&nbsp; Omega <small>tap to choose</small></button></div>
  <button class="sheet-handle" id="sheetHandle" aria-label="Open controls">⌃</button>
  <section class="sheet" id="sheet">
    <div class="tabs"><button class="tab active" data-tab="agents">agents</button><button class="tab" data-tab="chat">chat</button><button class="tab" data-tab="setup">setup</button></div>
    <div class="pane active" id="pane-agents"><div class="agent-list" id="agentList"></div></div>
    <div class="pane" id="pane-chat"><div class="chat-stream" id="chatStream"></div><div class="compose"><textarea id="chatInput" placeholder="Tell the selected agent what to make…"></textarea><button class="send" id="sendBtn">send</button></div></div>
    <div class="pane" id="pane-setup"><div class="setup">
      <label class="setting"><input id="behindMe" type="checkbox"><span class="setting-copy"><b>put AI behind me</b><small>Best with a plain green background. Your camera remains the human layer.</small></span></label>
      <label class="setting"><input id="phoneShake" type="checkbox"><span class="setting-copy"><b>shake the phone</b><small>Physically shaking clears only the selected agent.</small></span></label>
      <div class="setting"><span class="setting-copy"><b>connection</b><small id="connectionText">Sponsored inference is not connected yet. The page uses a visible local mock.</small></span></div>
      <div class="minirow"><button class="mini" id="historyBtn">history</button><button class="mini" id="snapshotBtn">snapshot</button><button class="mini" id="clearHumanBtn">clear my drawing</button></div>
      <ol class="history" id="history" hidden></ol>
    </div></div>
  </section>
  <nav class="dock">
    <button class="tool" id="cameraBtn"><span class="icon">◉</span><span>camera</span></button>
    <button class="tool on" id="drawBtn"><span class="icon">✎</span><span>draw</span></button>
    <button class="tool make" id="makeBtn"><span class="icon">✦</span><span>make</span></button>
    <button class="tool shake" id="shakeBtn"><span class="icon">↯</span><span>shake</span></button>
  </nav>
</div>
<script>
(()=>{
'use strict';
const STORE='z0.mobile.v5',OWNER_ENDPOINT='';
const $=s=>document.querySelector(s),canvas=$('#stage'),ctx=canvas.getContext('2d',{willReadFrequently:true}),video=$('#video'),camCanvas=document.createElement('canvas'),camCtx=camCanvas.getContext('2d',{willReadFrequently:true});
let S=load(),draw=null,drawMode=true,cam=null,behind=false,toastTimer=null,motionEnabled=false,lastShake=0;
function fresh(){return{selected:'omega',agents:[{id:'omega',name:'Omega',glyph:'Ω',role:'witnesses and interprets',color:'#ffc468'},{id:'synth',name:'Synth',glyph:'S',role:'builds a coherent scene',color:'#c7a6ff'},{id:'challenge',name:'Challenger',glyph:'!',role:'adds contrast and tests it',color:'#ff8f8f'}],events:[]}}
function load(){try{return Object.assign(fresh(),JSON.parse(localStorage.getItem(STORE)||'{}'))}catch{return fresh()}}function save(){localStorage.setItem(STORE,JSON.stringify(S))}function agent(){return S.agents.find(a=>a.id===S.selected)||S.agents[0]}function uid(){return crypto.randomUUID()}function event(kind,actor,payload){const e={id:uid(),kind,actor,payload,at:new Date().toISOString(),prev:S.events.at(-1)?.id||null};S.events.push(e);save();renderUI();return e}
function active(){const revoked=new Set();for(const e of S.events){if(e.kind==='revoke')revoked.add(e.payload.target);if(e.kind==='shake')for(const x of S.events)if(x.kind==='mark'&&x.actor===e.payload.agent)revoked.add(x.id);if(e.kind==='clear-human')for(const x of S.events)if(x.kind==='mark'&&x.actor==='human')revoked.add(x.id)}return S.events.filter(e=>e.kind==='mark'&&!revoked.has(e.id))}
function flash(t,good=true){clearTimeout(toastTimer);const r=$('#receipt');r.textContent=t;r.style.borderColor=good?'var(--human)':'var(--danger)';r.style.color=good?'var(--human)':'var(--danger)';r.classList.add('show');toastTimer=setTimeout(()=>r.classList.remove('show'),2300)}
function fit(){const r=canvas.getBoundingClientRect(),d=devicePixelRatio||1;canvas.width=Math.max(1,Math.floor(r.width*d));canvas.height=Math.max(1,Math.floor(r.height*d));ctx.setTransform(d,0,0,d,0,0)}
function drawScene(p,w,h){const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,p.sky||'#13202b');g.addColorStop(1,p.ground||'#211815');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.fillStyle=p.sun||'#ffc468';ctx.beginPath();ctx.arc((p.sunX||.72)*w,(p.sunY||.22)*h,Math.min(w,h)*.075,0,Math.PI*2);ctx.fill();ctx.fillStyle=p.ground||'#211815';ctx.fillRect(0,(p.horizon||.68)*h,w,h)}
function drawMark(e,w,h){const p=e.payload;ctx.save();ctx.strokeStyle=p.color||'#fff';ctx.fillStyle=p.color||'#fff';ctx.lineWidth=p.width||3;ctx.lineCap='round';ctx.lineJoin='round';if(p.type==='stroke'){ctx.beginPath();p.points.forEach(([x,y],i)=>i?ctx.lineTo(x*w,y*h):ctx.moveTo(x*w,y*h));ctx.stroke()}else if(p.type==='text'){ctx.font=p.human?'600 18px Georgia,serif':'600 15px ui-monospace,Consolas,monospace';ctx.fillText(p.text,(p.x||.2)*w,(p.y||.3)*h)}ctx.restore()}
function drawCamera(w,h){if(!cam||!video.videoWidth)return;const pw=Math.min(640,Math.max(1,Math.floor(w))),ph=Math.max(1,Math.floor(pw*h/w));if(camCanvas.width!==pw||camCanvas.height!==ph){camCanvas.width=pw;camCanvas.height=ph}camCtx.clearRect(0,0,pw,ph);camCtx.drawImage(video,0,0,pw,ph);if(behind){const im=camCtx.getImageData(0,0,pw,ph),d=im.data;for(let i=0;i<d.length;i+=4){const r=d[i],g=d[i+1],b=d[i+2];if(g>72&&g>r*1.2&&g>b*1.16)d[i+3]=Math.max(0,255-(g-Math.max(r,b))*4)}camCtx.putImageData(im,0,0)}ctx.drawImage(camCanvas,0,0,w,h)}
function paint(){const w=canvas.clientWidth,h=canvas.clientHeight,marks=active();ctx.clearRect(0,0,w,h);ctx.fillStyle='#11161b';ctx.fillRect(0,0,w,h);for(const e of marks)if(e.payload.type==='scene')drawScene(e.payload.scene||{},w,h);for(const e of marks)if(e.actor!=='human'&&e.payload.type!=='scene'&&e.payload.plane==='back')drawMark(e,w,h);drawCamera(w,h);for(const e of marks)if(e.actor==='human')drawMark(e,w,h);for(const e of marks)if(e.actor!=='human'&&e.payload.plane==='front')drawMark(e,w,h);if(draw)drawMark({payload:{type:'stroke',points:draw,color:'#6fe2f0'}},w,h);requestAnimationFrame(paint)}
function pos(ev){const r=canvas.getBoundingClientRect();return[(ev.clientX-r.left)/r.width,(ev.clientY-r.top)/r.height]}
canvas.onpointerdown=e=>{if(!drawMode)return;canvas.setPointerCapture(e.pointerId);draw=[pos(e)];$('#hint').classList.add('hide')};canvas.onpointermove=e=>{if(draw)draw.push(pos(e))};canvas.onpointerup=()=>{if(draw&&draw.length>1)event('mark','human',{type:'stroke',points:draw,color:'#6fe2f0',human:true,plane:'human'});draw=null};canvas.onpointercancel=()=>draw=null;
function renderAgents(){const box=$('#agentList');box.innerHTML='';for(const a of S.agents){const card=document.createElement('div');card.className='agent-card'+(a.id===S.selected?' active':'');card.innerHTML=`<div class="agent-orb" style="color:${a.color}">${a.glyph}</div><div class="agent-copy"><b>${a.name}</b><small>${a.role}</small></div><button class="pick">${a.id===S.selected?'selected':'choose'}</button>`;card.querySelector('button').onclick=()=>{S.selected=a.id;save();renderUI();closeSheet()};box.append(card)}}
function renderChat(){const stream=$('#chatStream');stream.innerHTML='';const msgs=S.events.filter(e=>e.kind==='chat');if(!msgs.length){const d=document.createElement('div');d.className='msg system';d.textContent='Choose an agent, then use Make or send it a sentence.';stream.append(d)}for(const e of msgs.slice(-60)){const d=document.createElement('article');d.className='msg '+(e.actor==='human'?'human':'agent');d.textContent=e.payload.text;stream.append(d)}stream.scrollTop=stream.scrollHeight}
function renderHistory(){const list=$('#history');list.innerHTML='';for(const e of S.events.slice(-80).reverse()){const li=document.createElement('li');li.textContent=`${e.kind} · ${e.actor} · ${new Date(e.at).toLocaleTimeString()}`;list.append(li)}}
function renderUI(){const a=agent();$('#agentNow').textContent=a.name;$('#agentPill').innerHTML=`${a.glyph}&nbsp; ${a.name} <small>tap to choose</small>`;$('#modeNow').textContent=OWNER_ENDPOINT?'guest':'mock';$('#cameraBtn').classList.toggle('on',!!cam);$('#drawBtn').classList.toggle('on',drawMode);$('#behindMe').checked=behind;renderAgents();renderChat();renderHistory()}
function setTab(name){document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('active',p.id==='pane-'+name));openSheet()}
function openSheet(){const s=$('#sheet');s.classList.add('open');$('#sheetHandle').textContent='⌄'}function closeSheet(){const s=$('#sheet');s.classList.remove('open');$('#sheetHandle').textContent='⌃'}
function shake(source='button'){const a=agent();event('shake','human',{agent:a.id,source});flash(`${a.name} cleared. You and the other agents remain.`)}
function mock(a,prompt){const n=S.events.filter(e=>e.kind==='mark'&&e.actor===a.id).length,low=prompt.toLowerCase();const scene=low.includes('forest')?{sky:'#10251f',ground:'#172219',sun:'#e7d89a'}:low.includes('space')?{sky:'#060816',ground:'#141027',sun:'#d6c7ff'}:low.includes('desert')?{sky:'#583522',ground:'#43261a',sun:'#ffc970'}:{sky:n%2?'#1d1b31':'#132431',ground:n%2?'#281728':'#19221d',sun:a.color};return{say:`${a.name}: I changed only my scene. Shake me whenever you want it gone.`,scene,text:prompt||'one turn'}}
async function infer(a,prompt){if(!OWNER_ENDPOINT)return mock(a,prompt);const r=await fetch(OWNER_ENDPOINT,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({agent:a,prompt,marks:active().slice(-40)})});if(!r.ok)throw Error('guest '+r.status);return r.json()}
async function make(prompt=''){const a=agent();if(prompt)event('chat','human',{text:prompt});$('#modeNow').textContent='working';try{const out=await infer(a,prompt);if(out.say)event('chat',a.id,{text:out.say});if(out.scene)event('mark',a.id,{type:'scene',scene:out.scene,plane:'back'});if(out.text)event('mark',a.id,{type:'text',text:`${a.name} · ${out.text}`.slice(0,60),x:.56,y:.24+(S.events.length*.08)%0.5,color:a.color,plane:'front'})}catch(e){flash('Guest inference unavailable; using local mock.',false);const out=mock(a,prompt);event('chat',a.id,{text:out.say});event('mark',a.id,{type:'scene',scene:out.scene,plane:'back'})}finally{$('#modeNow').textContent=OWNER_ENDPOINT?'guest':'mock';renderUI()}}
$('#cameraBtn').onclick=async()=>{if(cam){cam.getTracks().forEach(t=>t.stop());cam=null;video.srcObject=null;event('camera','human',{on:false});return}try{cam=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});video.srcObject=cam;await video.play();event('camera','human',{on:true});$('#hint').classList.add('hide')}catch{flash('Camera permission was not granted.',false)}};
$('#drawBtn').onclick=()=>{drawMode=!drawMode;renderUI();flash(drawMode?'Draw with your finger.':'Drawing paused.')};$('#makeBtn').onclick=()=>make('');$('#shakeBtn').onclick=()=>shake();
$('#agentPill').onclick=()=>setTab('agents');$('#sheetHandle').onclick=()=>$('#sheet').classList.contains('open')?closeSheet():openSheet();document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
$('#sendBtn').onclick=()=>{const i=$('#chatInput'),t=i.value.trim();if(!t)return;i.value='';make(t)};$('#chatInput').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();$('#sendBtn').click()}};
$('#behindMe').onchange=e=>{behind=e.target.checked;event('camera-mode','human',{behind});flash(behind?'AI can appear behind you when the background is plain green.':'Camera returned to normal.')};
$('#phoneShake').onchange=async e=>{try{if(e.target.checked&&typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){const p=await DeviceMotionEvent.requestPermission();if(p!=='granted')throw Error('permission denied')}motionEnabled=e.target.checked;if(motionEnabled)window.addEventListener('devicemotion',motion);else window.removeEventListener('devicemotion',motion)}catch(err){e.target.checked=false;flash('Phone motion permission was not available.',false)}};
function motion(e){if(!motionEnabled)return;const a=e.accelerationIncludingGravity;if(!a)return;const mag=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2),t=Date.now();if(mag>22&&t-lastShake>1800){lastShake=t;shake('physical')}}
$('#historyBtn').onclick=()=>{$('#history').hidden=!$('#history').hidden};$('#snapshotBtn').onclick=()=>{const a=document.createElement('a');a.href=canvas.toDataURL('image/jpeg',.82);a.download=`z0-${Date.now()}.jpg`;a.click()};$('#clearHumanBtn').onclick=()=>{event('clear-human','human',{});flash('Your drawing was cleared. Agent scenes remain.')};
window.onresize=fit;fit();paint();renderUI();if(!S.events.length)event('surface','human',{invariant:'human persists; agents shake separately'});
})();
</script>
</body>
</html>
