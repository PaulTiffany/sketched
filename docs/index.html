async function refreshModels(){if(!state.key)return;$('#refreshButton').disabled=true;$('#catalogStatus').textContent='Finding free models…';try{const all=(await api('https://openrouter.ai/api/v1/models?output_modalities=text&supported_parameters=response_format&sort=latency-low-to-high')).data||[];models=all.filter(m=>isFree(m)&&supportsJSON(m));models.sort((a,b)=>a.id==='openrouter/free'?1:b.id==='openrouter/free'?-1:0);const s=$('#modelSelect');s.innerHTML='';models.forEach((m,i)=>{const o=document.createElement('option'),vision=seesImages(m)?(m.id==='openrouter/free'?'VISION ROUTER':'VISION'):'TEXT ONLY';o.value=m.id;o.textContent=`${m.name||m.id} · ${vision} · FREE${m.id==='openrouter/free'?' · variable':` · speed #${i+1}`}`;s.append(o)});state.model=models.some(m=>m.id===state.model)?state.model:(models.find(m=>m.id!=='openrouter/free')||models[0])?.id||'';s.value=state.model;s.disabled=!models.length;$('#testButton').disabled=!state.model;showModel();const v=models.filter(seesImages).length;$('#catalogStatus').textContent=models.length?`${v} vision · ${models.length-v} text only`:'No free compatible model is currently advertised.';worker?.postMessage({type:'config',key:state.key,model:state.model});save()}catch(e){$('#catalogStatus').textContent='Catalog failed: '+e.message;toast(e.message,true)}finally{$('#refreshButton').disabled=false}}
function showModel(){const i=models.findIndex(m=>m.id===state.model),m=models[i];if(!m){$('#modelMeta').textContent='No free model selected.';return}$('#modelMeta').textContent=`${m.id}\n${seesImages(m)?'VISION · sees stream snapshots':'TEXT ONLY · streams remain local'}\nlatency position ${i+1} of ${models.length}\ncontext ${Number(m.context_length||0).toLocaleString()} tokens\ncost ceiling $0`}
async function testModel(){if(!state.key||!state.model)return;$('#testButton').disabled=true;$('#testResult').textContent='Testing…';const started=performance.now();try{const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{method:'POST',headers:{Authorization:`Bearer ${state.key}`,'Content-Type':'application/json','HTTP-Referer':location.origin,'X-OpenRouter-Title':'Z0 Sketched'},body:JSON.stringify({model:state.model,max_tokens:40,temperature:0,reasoning:{effort:'none',exclude:true},provider:{sort:'latency',allow_fallbacks:true,max_price:{prompt:0,completion:0,image:0}},messages:[{role:'user',content:'Reply exactly: Z0 free inference works.'}]})}),d=await r.json();if(!r.ok)throw Error(d.error?.message||`HTTP ${r.status}`);$('#testResult').textContent=`SUCCESS\nserved: ${d.model||'unknown'}\nlatency: ${((performance.now()-started)/1000).toFixed(2)}s\ncost ceiling $0`}catch(e){$('#testResult').textContent='FAILED\n'+friendly(e.message);toast(friendly(e.message),true)}finally{$('#testButton').disabled=false}}
async function init(){load();if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});try{await oauth()}catch(e){toast(e.message,true)}routerUI();runtime();renderMessages();fit();paint(performance.now());document.querySelectorAll('.size').forEach(b=>b.classList.toggle('active',b.dataset.size===state.size));$('#browserFrame').src=state.url||HOME;if(state.pageText)renderReader((state.sharedText?`# Shared by presenter\n\n${state.sharedText}\n\n---\n\n`:'')+state.pageText,state.url);else await readUrl(state.url||HOME);if(state.key)refreshModels()}
$('#surfMode').onclick=()=>setMode('surf');$('#streamMode').onclick=()=>setMode('stream');$('#drawButton').onclick=toggleDraw;$('#undoButton').onclick=undoHuman;$('#clearHumanButton').onclick=clearHuman;$('#urlForm').onsubmit=e=>{e.preventDefault();loadUrl($('#urlInput').value)};$('#readerToggle').onclick=()=>showReader(!state.reader);$('#openButton').onclick=()=>window.open(state.url||HOME,'_blank','noopener,noreferrer');$('#reader').addEventListener('click',e=>{const a=e.target.closest('a[data-nav]');if(!a)return;e.preventDefault();loadUrl(a.href)});$('#cameraButton').onclick=()=>startMedia('camera');$('#screenButton').onclick=()=>startMedia('screen');$('#stopStream').onclick=stopMedia;$('#setupButton').onclick=openSetup;$('#closeSetup').onclick=closeSetup;$('#wakeButton').onclick=wake;$('#sleepButton').onclick=sleepOmega;$('#connectButton').onclick=connect;$('#disconnectButton').onclick=()=>{state.key=null;state.model='';models=[];worker?.postMessage({type:'config',key:'',model:''});routerUI();save()};$('#refreshButton').onclick=refreshModels;$('#modelSelect').onchange=e=>{state.model=e.target.value;showModel();worker?.postMessage({type:'config',key:state.key,model:state.model});save()};$('#testButton').onclick=testModel;$('#tempoSelect').onchange=e=>{state.tempo=e.target.value;showTempo();clearTimeout(voiceTimer);save()};$('#channelSelect').onchange=e=>{state.channel=e.target.value;speechSynthesis?.cancel();save()};$('#listenButton').onclick=toggleListen;$('#makeButton').onclick=make;$('#sendButton').onclick=send;$('#chatInput').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};$('#clearOmegaButton').onclick=()=>{scene=null;omegaCtx.clearRect(0,0,omegaCanvas.clientWidth,omegaCanvas.clientHeight);$('#operatorBadge').classList.remove('show');toast('Omega marks cleared.')};$('#clearChatButton').onclick=()=>{state.messages=[];renderMessages();save()};document.querySelectorAll('.size').forEach(b=>b.onclick=()=>{state.size=b.dataset.size;document.documentElement.dataset.size=state.size;document.querySelectorAll('.size').forEach(x=>x.classList.toggle('active',x===b));save();fit()});window.addEventListener('resize',fit);visualViewport?.addEventListener('resize',fit);screen.orientation?.addEventListener('change',()=>setTimeout(fit,120));init();
})();
