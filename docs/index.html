<!doctype html>
<html lang="en" data-text="large">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050607">
<title>Z0 / Sketched</title>
<style>
:root{--bg:#050607;--ink:#f4f0e7;--muted:#adb7c1;--line:#3b4650;--human:#78e7f3;--agent:#ffd07a;--danger:#ff8585;--panel:#101419;font-size:18px;color-scheme:dark}
html[data-text="standard"]{font-size:16px}html[data-text="large"]{font-size:18px}html[data-text="extra"]{font-size:21px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{width:100%;height:100%;margin:0;overflow:hidden;overscroll-behavior:none;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;-webkit-text-size-adjust:100%;text-size-adjust:100%}
button,input,textarea{font:inherit}button{color:inherit;touch-action:manipulation;min-width:44px;min-height:44px}button:focus-visible,input:focus-visible,textarea:focus-visible{outline:3px solid var(--human);outline-offset:3px}.app{position:fixed;inset:0;background:#050607}.stage{position:absolute;inset:0;background:#11161b;overflow:hidden}#stage{position:absolute;inset:0;width:100%;height:100%;touch-action:none}.top{position:absolute;z-index:8;left:0;right:0;top:0;display:flex;align-items:center;gap:.55rem;padding:calc(.7rem + env(safe-area-inset-top)) .8rem .65rem;background:linear-gradient(#050607e8,#05060700);pointer-events:none}.brand{font:700 1.08rem Georgia,serif;letter-spacing:.01em}.status{margin-left:auto;border:1px solid var(--line);border-radius:999px;padding:.48rem .65rem;background:#0a0d10d9;color:var(--muted);font:700 .74rem/1.1 ui-monospace,Consolas,monospace}.agent-now{color:var(--agent)}
.hint{position:absolute;z-index:7;left:50%;top:13%;transform:translateX(-50%);max-width:min(88vw,32rem);text-align:center;color:#d7dce1;font:700 .88rem/1.5 ui-monospace,Consolas,monospace;text-shadow:0 2px 10px #000;opacity:.92;pointer-events:none;transition:opacity .25s}.hint.hide{opacity:0}.receipt{position:absolute;z-index:20;left:50%;bottom:calc(8.4rem + env(safe-area-inset-bottom));transform:translate(-50%,12px);opacity:0;transition:.2s;background:#07090cf2;border:1px solid var(--human);color:var(--human);border-radius:.65rem;padding:.68rem .8rem;max-width:90vw;text-align:center;font:700 .76rem/1.45 ui-monospace,Consolas,monospace;pointer-events:none}.receipt.show{opacity:1;transform:translate(-50%,0)}
.agent-strip{position:absolute;z-index:12;left:50%;bottom:calc(6.9rem + env(safe-area-inset-bottom));transform:translateX(-50%);display:flex;align-items:center;gap:.55rem}.agent-pill{border:1px solid #8b6d3a;background:#1b160e;color:var(--agent);border-radius:999px;padding:.62rem .9rem;font:700 .82rem/1 ui-monospace,Consolas,monospace;box-shadow:0 8px 24px #0009}.agent-pill small{color:#d4ae6c;font-size:.78em}.agent-pill:active{transform:scale(.97)}
.dock{position:absolute;z-index:14;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(4,1fr);gap:.5rem;padding:.65rem .65rem calc(.72rem + env(safe-area-inset-bottom));background:linear-gradient(#05060700,#050607 24%)}.tool{height:5.25rem;min-height:76px;border:1px solid var(--line);border-radius:1rem;background:#12171ced;display:grid;place-items:center;align-content:center;gap:.3rem;box-shadow:0 8px 30px #0009;font:750 .8rem/1 ui-monospace,Consolas,monospace}.tool .icon{font-size:1.65rem;line-height:1}.tool.on{border-color:var(--human);color:var(--human);box-shadow:inset 0 0 0 1px #78e7f33d,0 8px 30px #0009}.tool.make{border-color:#806536;color:var(--agent)}.tool.shake{border-color:#824747;color:var(--danger)}.tool:active{transform:translateY(2px) scale(.98)}
.sheet-handle{position:absolute;z-index:16;left:50%;bottom:calc(6.25rem + env(safe-area-inset-bottom));transform:translateX(-50%);width:5rem;height:2.75rem;min-height:44px;border:1px solid var(--line);border-bottom:0;border-radius:.9rem .9rem 0 0;background:#0e1216;display:grid;place-items:center;color:#aeb8c2;font-size:1.25rem}.sheet{position:absolute;z-index:15;left:0;right:0;bottom:0;height:min(60dvh,560px);background:#0d1115fa;border-top:1px solid var(--line);border-radius:1rem 1rem 0 0;box-shadow:0 -20px 70px #000b;transform:translateY(calc(100% - 6.1rem - env(safe-area-inset-bottom)));transition:transform .24s ease;display:grid;grid-template-rows:auto 1fr;padding-bottom:calc(6.15rem + env(safe-area-inset-bottom));backdrop-filter:blur(18px)}.sheet.open{transform:translateY(0)}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem;padding:.85rem .75rem .65rem}.tab{border:1px solid var(--line);border-radius:999px;background:#14191f;padding:.68rem .55rem;color:var(--muted);font:750 .82rem/1 ui-monospace,Consolas,monospace}.tab.active{color:var(--human);border-color:#438894}.pane{display:none;min-height:0;overflow:auto;padding:.45rem .85rem .95rem;-webkit-overflow-scrolling:touch}.pane.active{display:block}.agent-list{display:grid;gap:.65rem}.agent-card{display:flex;align-items:center;gap:.75rem;min-height:72px;border:1px solid var(--line);border-radius:.8rem;background:#12171c;padding:.78rem}.agent-card.active{border-color:#8b6d3a;background:#1a150e}.agent-orb{width:2.8rem;height:2.8rem;flex:0 0 2.8rem;border-radius:50%;display:grid;place-items:center;border:1px solid currentColor;color:var(--agent);font:700 1.15rem Georgia,serif}.agent-copy{min-width:0;font-size:1rem}.agent-copy b{display:block;line-height:1.25}.agent-copy small{display:block;margin-top:.2rem;color:var(--muted);font-size:.84rem;line-height:1.35}.pick{margin-left:auto;border:1px solid #57626d;border-radius:999px;background:#171c22;padding:.58rem .7rem;font:750 .74rem ui-monospace,Consolas,monospace}.chat-stream{display:flex;flex-direction:column;gap:.58rem;min-height:9rem;max-height:22rem;overflow:auto;padding-bottom:.6rem}.msg{max-width:90%;border:1px solid var(--line);border-radius:.75rem;padding:.7rem .78rem;font-size:.96rem;line-height:1.55;white-space:pre-wrap}.msg.human{align-self:flex-end;border-color:#438894;background:#78e7f30f}.msg.agent{align-self:flex-start;border-color:#8b6d3a;background:#ffd07a0f}.msg.system{align-self:center;color:var(--muted);font:650 .78rem/1.45 ui-monospace,Consolas,monospace;background:transparent}.compose{display:grid;grid-template-columns:1fr auto;gap:.55rem}.compose textarea{resize:none;height:4rem;min-height:64px;background:#080b0e;color:var(--ink);border:1px solid var(--line);border-radius:.65rem;padding:.75rem;font-size:1rem;line-height:1.45}.send{border:1px solid #8b6d3a;border-radius:.65rem;background:#1a150e;color:var(--agent);padding:0 1rem;font-weight:750}.setup{display:grid;gap:.72rem}.setting{display:flex;align-items:center;gap:.75rem;min-height:64px;border:1px solid var(--line);border-radius:.75rem;background:#12171c;padding:.8rem}.setting.column{align-items:stretch;flex-direction:column}.setting input[type="checkbox"]{width:1.35rem;height:1.35rem;flex:0 0 1.35rem;accent-color:var(--human)}.setting-copy b{display:block;font-size:.98rem;line-height:1.3}.setting-copy small{display:block;margin-top:.18rem;color:var(--muted);font-size:.84rem;line-height:1.45}.text-choices{display:grid;grid-template-columns:repeat(3,1fr);gap:.45rem}.text-choice{border:1px solid var(--line);border-radius:.6rem;background:#171c22;color:var(--muted);padding:.65rem .4rem;font-weight:750}.text-choice.active{border-color:var(--human);color:var(--human);background:#102126}.minirow{display:flex;gap:.55rem;flex-wrap:wrap}.mini{border:1px solid var(--line);border-radius:999px;background:#14191f;padding:.62rem .78rem;color:var(--muted);font:750 .76rem ui-monospace,Consolas,monospace}.history{list-style:none;padding:0;margin:0}.history li{padding:.58rem 0;border-bottom:1px solid #2b333b;font:650 .75rem/1.45 ui-monospace,Consolas,monospace;color:#c3cbd2}
@media(max-width:360px){:root{font-size:17px}.dock{gap:.35rem;padding-inline:.45rem}.tool{font-size:.74rem}.agent-pill{font-size:.76rem}}
@media(min-width:900px){.dock{left:50%;right:auto;width:min(660px,72vw);transform:translateX(-50%)}.sheet{left:50%;right:auto;width:min(720px,92vw);transform:translate(-50%,calc(100% - 6.1rem));}.sheet.open{transform:translate(-50%,0)}.sheet-handle{bottom:6.25rem}.agent-strip{bottom:6.9rem}}
@media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition-duration:.01ms!important;animation-duration:.01ms!important}}
</style>
</head>
<body>
<div class="app">
  <section class="stage">
    <canvas id="stage"></canvas><video id="video" playsinline muted hidden></video>
    <header class="top"><div class="brand">Z0 / Sketched</div><div class="status"><span class="agent-now" id="agentNow">Omega</span> · <span id="modeNow">mock</span></div></header>
    <div class="hint" id="hint">Turn on the camera or draw with your finger.</div>
    <div class="receipt" id="receipt" role="status" aria-live="polite"></div>
  </section>
  <div class="agent-strip"><button class="agent-pill" id="agentPill" aria-label="Choose agent">Ω&nbsp; Omega <small>tap to choose</small></button></div>
  <button class="sheet-handle" id="sheetHandle" aria-label="Open controls" aria-expanded="false">⌃</button>
  <section class="sheet" id="sheet" aria-label="Controls">
    <div class="tabs" role="tablist"><button class="tab active" data-tab="agents" role="tab" aria-selected="true">agents</button><button class="tab" data-tab="chat" role="tab" aria-selected="false">chat</button><button class="tab" data-tab="setup" role="tab" aria-selected="false">setup</button></div>
    <div class="pane active" id="pane-agents"><div class="agent-list" id="agentList"></div></div>
    <div class="pane" id="pane-chat"><div class="chat-stream" id="chatStream" aria-live="polite"></div><div class="compose"><textarea id="chatInput" aria-label="Message selected agent" placeholder="Tell the selected agent what to make…"></textarea><button class="send" id="sendBtn">send</button></div></div>
    <div class="pane" id="pane-setup"><div class="setup">
      <div class="setting column"><span class="setting-copy"><b>text size</b><small>Large is the phone-first default. Your choice stays on this device.</small></span><div class="text-choices" role="group" aria-label="Text size"><button class="text-choice" data-size="standard">standard</button><button class="text-choice" data-size="large">large</button><button class="text-choice" data-size="extra">extra</button></div></div>
      <label class="setting"><input id="behindMe" type="checkbox"><span class="setting-copy"><b>put AI behind me</b><small>Best with a plain green background. Your camera remains the human layer.</small></span></label>
      <label class="setting"><input id="phoneShake" type="checkbox"><span class="setting-copy"><b>shake the phone</b><small>Physically shaking clears only the selected agent.</small></span></label>
      <div class="setting"><span class="setting-copy"><b>connection</b><small id="connectionText">Sponsored inference is not connected yet. The page uses a visible local mock.</small></span></div>
      <div class="minirow"><button class="mini" id="historyBtn">history</button><button class="mini" id="snapshotBtn">snapshot</button><button class="mini" id="clearHumanBtn">clear my drawing</button></div>
      <ol class="history" id="history" hidden></ol>
    </div></div>
  </section>
  <nav class="dock" aria-label="Primary tools">
    <button class="tool" id="cameraBtn" aria-pressed="false"><span class="icon" aria-hidden="true">◉</span><span>camera</span></button>
    <button class="tool on" id="drawBtn" aria-pressed="true"><span class="icon" aria-hidden="true">✎</span><span>draw</span></button>
    <button class="tool make" id="makeBtn"><span class="icon" aria-hidden="true">✦</span><span>make</span></button>
    <button class="tool shake" id="shakeBtn"><span class="icon" aria-hidden="true">↯</span><span>shake</span></button>
  </nav>
</div>
<script>
(()=>{
'use strict';
const STORE='z0.mobile.v5',OWNER_ENDPOINT='';
const $=s=>document.querySelector(s),canvas=$('#stage'),ctx=canvas.getContext('2d',{willReadFrequently:true}),video=$('#video'),camCanvas=document.createElement('canvas'),camCtx=camCanvas.getContext('2d',{willReadFrequently:true});
let S=load(),draw=null,drawMode=true,cam=null,behind=false,toastTimer=null,motionEnabled=false,lastShake=0;
function fresh(){return{textSize:'large',selected:'omega',agents:[{id:'omega',name:'Omega',glyph:'Ω',role:'witnesses and interprets',color:'#ffc468'},{id:'synth',name:'Synth',glyph:'S',role:'builds a coherent scene',color:'#c7a6ff'},{id:'challenge',name:'Challenger',glyph:'!',role:'adds contrast and tests it',color:'#ff8f8f'}],events:[]}}
function load(){try{return Object.assign(fresh(),JSON.parse(localStorage.getItem(STORE)||'{}'))}catch{return fresh()}}function save(){localStorage.setItem(STORE,JSON.stringify(S))}function agent(){return S.agents.find(a=>a.id===S.selected)||S.agents[0]}function uid(){return crypto.randomUUID()}function event(kind,actor,payload){const e={id:uid(),kind,actor,payload,at:new Date().toISOString(),prev:S.events.at(-1)?.id||null};S.events.push(e);save();renderUI();return e}
function active(){const revoked=new Set();for(const e of S.events){if(e.kind==='revoke')revoked.add(e.payload.target);if(e.kind==='shake')for(const x of S.events)if(x.kind==='mark'&&x.actor===e.payload.agent)revoked.add(x.id);if(e.kind==='clear-human')for(const x of S.events)if(x.kind==='mark'&&x.actor==='human')revoked.add(x.id)}return S.events.filter(e=>e.kind==='mark'&&!revoked.has(e.id))}
function flash(t,good=true){clearTimeout(toastTimer);const r=$('#receipt');r.textContent=t;r.style.borderColor=good?'var(--human)':'var(--danger)';r.style.color=good?'var(--human)':'var(--danger)';r.classList.add('show');toastTimer=setTimeout(()=>r.classList.remove('show'),2600)}
function fit(){const r=canvas.getBoundingClientRect(),d=devicePixelRatio||1;canvas.width=Math.max(1,Math.floor(r.width*d));canvas.height=Math.max(1,Math.floor(r.height*d));ctx.setTransform(d,0,0,d,0,0)}
function drawScene(p,w,h){const g=ctx.createLinearGradient(0,0,0,h);g.addColorStop(0,p.sky||'#13202b');g.addColorStop(1,p.ground||'#211815');ctx.fillStyle=g;ctx.fillRect(0,0,w,h);ctx.fillStyle=p.sun||'#ffc468';ctx.beginPath();ctx.arc((p.sunX||.72)*w,(p.sunY||.22)*h,Math.min(w,h)*.075,0,Math.PI*2);ctx.fill();ctx.fillStyle=p.ground||'#211815';ctx.fillRect(0,(p.horizon||.68)*h,w,h)}
function canvasScale(){return S.textSize==='extra'?1.28:S.textSize==='standard'?.95:1.12}function drawMark(e,w,h){const p=e.payload,scale=canvasScale();ctx.save();ctx.strokeStyle=p.color||'#fff';ctx.fillStyle=p.color||'#fff';ctx.lineWidth=p.width||3;ctx.lineCap='round';ctx.lineJoin='round';if(p.type==='stroke'){ctx.beginPath();p.points.forEach(([x,y],i)=>i?ctx.lineTo(x*w,y*h):ctx.moveTo(x*w,y*h));ctx.stroke()}else if(p.type==='text'){ctx.font=p.human?`600 ${20*scale}px Georgia,serif`:`600 ${17*scale}px ui-monospace,Consolas,monospace`;ctx.fillText(p.text,(p.x||.2)*w,(p.y||.3)*h)}ctx.restore()}
function drawCamera(w,h){if(!cam||!video.videoWidth)return;const pw=Math.min(640,Math.max(1,Math.floor(w))),ph=Math.max(1,Math.floor(pw*h/w));if(camCanvas.width!==pw||camCanvas.height!==ph){camCanvas.width=pw;camCanvas.height=ph}camCtx.clearRect(0,0,pw,ph);camCtx.drawImage(video,0,0,pw,ph);if(behind){const im=camCtx.getImageData(0,0,pw,ph),d=im.data;for(let i=0;i<d.length;i+=4){const r=d[i],g=d[i+1],b=d[i+2];if(g>72&&g>r*1.2&&g>b*1.16)d[i+3]=Math.max(0,255-(g-Math.max(r,b))*4)}camCtx.putImageData(im,0,0)}ctx.drawImage(camCanvas,0,0,w,h)}
function paint(){const w=canvas.clientWidth,h=canvas.clientHeight,marks=active();ctx.clearRect(0,0,w,h);ctx.fillStyle='#11161b';ctx.fillRect(0,0,w,h);for(const e of marks)if(e.payload.type==='scene')drawScene(e.payload.scene||{},w,h);for(const e of marks)if(e.actor!=='human'&&e.payload.type!=='scene'&&e.payload.plane==='back')drawMark(e,w,h);drawCamera(w,h);for(const e of marks)if(e.actor==='human')drawMark(e,w,h);for(const e of marks)if(e.actor!=='human'&&e.payload.plane==='front')drawMark(e,w,h);if(draw)drawMark({payload:{type:'stroke',points:draw,color:'#78e7f3'}},w,h);requestAnimationFrame(paint)}
function pos(ev){const r=canvas.getBoundingClientRect();return[(ev.clientX-r.left)/r.width,(ev.clientY-r.top)/r.height]}
canvas.onpointerdown=e=>{if(!drawMode)return;canvas.setPointerCapture(e.pointerId);draw=[pos(e)];$('#hint').classList.add('hide')};canvas.onpointermove=e=>{if(draw)draw.push(pos(e))};canvas.onpointerup=()=>{if(draw&&draw.length>1)event('mark','human',{type:'stroke',points:draw,color:'#78e7f3',human:true,plane:'human'});draw=null};canvas.onpointercancel=()=>draw=null;
function renderAgents(){const box=$('#agentList');box.innerHTML='';for(const a of S.agents){const card=document.createElement('div');card.className='agent-card'+(a.id===S.selected?' active':'');card.innerHTML=`<div class="agent-orb" style="color:${a.color}">${a.glyph}</div><div class="agent-copy"><b>${a.name}</b><small>${a.role}</small></div><button class="pick">${a.id===S.selected?'selected':'choose'}</button>`;card.querySelector('button').onclick=()=>{S.selected=a.id;save();renderUI();closeSheet()};box.append(card)}}
function renderChat(){const stream=$('#chatStream');stream.innerHTML='';const msgs=S.events.filter(e=>e.kind==='chat');if(!msgs.length){const d=document.createElement('div');d.className='msg system';d.textContent='Choose an agent, then use Make or send it a sentence.';stream.append(d)}for(const e of msgs.slice(-60)){const d=document.createElement('article');d.className='msg '+(e.actor==='human'?'human':'agent');d.textContent=e.payload.text;stream.append(d)}stream.scrollTop=stream.scrollHeight}
function renderHistory(){const list=$('#history');list.innerHTML='';for(const e of S.events.slice(-80).reverse()){const li=document.createElement('li');li.textContent=`${e.kind} · ${e.actor} · ${new Date(e.at).toLocaleTimeString()}`;list.append(li)}}
function applyTextSize(){const size=['standard','large','extra'].includes(S.textSize)?S.textSize:'large';S.textSize=size;document.documentElement.dataset.text=size;document.querySelectorAll('.text-choice').forEach(b=>{const on=b.dataset.size===size;b.classList.toggle('active',on);b.setAttribute('aria-pressed',String(on))})}
function renderUI(){const a=agent();applyTextSize();$('#agentNow').textContent=a.name;$('#agentPill').innerHTML=`${a.glyph}&nbsp; ${a.name} <small>tap to choose</small>`;$('#modeNow').textContent=OWNER_ENDPOINT?'guest':'mock';$('#cameraBtn').classList.toggle('on',!!cam);$('#cameraBtn').setAttribute('aria-pressed',String(!!cam));$('#drawBtn').classList.toggle('on',drawMode);$('#drawBtn').setAttribute('aria-pressed',String(drawMode));$('#behindMe').checked=behind;renderAgents();renderChat();renderHistory()}
function setTab(name){document.querySelectorAll('.tab').forEach(b=>{const on=b.dataset.tab===name;b.classList.toggle('active',on);b.setAttribute('aria-selected',String(on))});document.querySelectorAll('.pane').forEach(p=>p.classList.toggle('active',p.id==='pane-'+name));openSheet()}
function openSheet(){const s=$('#sheet');s.classList.add('open');$('#sheetHandle').textContent='⌄';$('#sheetHandle').setAttribute('aria-expanded','true')}function closeSheet(){const s=$('#sheet');s.classList.remove('open');$('#sheetHandle').textContent='⌃';$('#sheetHandle').setAttribute('aria-expanded','false')}
function shake(source='button'){const a=agent();event('shake','human',{agent:a.id,source});flash(`${a.name} cleared. You and the other agents remain.`)}
function mock(a,prompt){const n=S.events.filter(e=>e.kind==='mark'&&e.actor===a.id).length,low=prompt.toLowerCase();const scene=low.includes('forest')?{sky:'#10251f',ground:'#172219',sun:'#e7d89a'}:low.includes('space')?{sky:'#060816',ground:'#141027',sun:'#d6c7ff'}:low.includes('desert')?{sky:'#583522',ground:'#43261a',sun:'#ffc970'}:{sky:n%2?'#1d1b31':'#132431',ground:n%2?'#281728':'#19221d',sun:a.color};return{say:`${a.name}: I changed only my scene. Shake me whenever you want it gone.`,scene,text:prompt||'one turn'}}
async function infer(a,prompt){if(!OWNER_ENDPOINT)return mock(a,prompt);const r=await fetch(OWNER_ENDPOINT,{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({agent:a,prompt,marks:active().slice(-40)})});if(!r.ok)throw Error('guest '+r.status);return r.json()}
async function make(prompt=''){const a=agent();if(prompt)event('chat','human',{text:prompt});$('#modeNow').textContent='working';try{const out=await infer(a,prompt);if(out.say)event('chat',a.id,{text:out.say});if(out.scene)event('mark',a.id,{type:'scene',scene:out.scene,plane:'back'});if(out.text)event('mark',a.id,{type:'text',text:`${a.name} · ${out.text}`.slice(0,60),x:.56,y:.24+(S.events.length*.08)%0.5,color:a.color,plane:'front'})}catch(e){flash('Guest inference unavailable; using local mock.',false);const out=mock(a,prompt);event('chat',a.id,{text:out.say});event('mark',a.id,{type:'scene',scene:out.scene,plane:'back'})}finally{$('#modeNow').textContent=OWNER_ENDPOINT?'guest':'mock';renderUI()}}
$('#cameraBtn').onclick=async()=>{if(cam){cam.getTracks().forEach(t=>t.stop());cam=null;video.srcObject=null;event('camera','human',{on:false});return}try{cam=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});video.srcObject=cam;await video.play();event('camera','human',{on:true});$('#hint').classList.add('hide')}catch{flash('Camera permission was not granted.',false)}};
$('#drawBtn').onclick=()=>{drawMode=!drawMode;renderUI();flash(drawMode?'Draw with your finger.':'Drawing paused.')};$('#makeBtn').onclick=()=>make('');$('#shakeBtn').onclick=()=>shake();
$('#agentPill').onclick=()=>setTab('agents');$('#sheetHandle').onclick=()=>$('#sheet').classList.contains('open')?closeSheet():openSheet();document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
document.querySelectorAll('.text-choice').forEach(b=>b.onclick=()=>{S.textSize=b.dataset.size;save();applyTextSize();fit();flash(`Text size: ${b.textContent}.`)});
$('#sendBtn').onclick=()=>{const i=$('#chatInput'),t=i.value.trim();if(!t)return;i.value='';make(t)};$('#chatInput').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();$('#sendBtn').click()}};
$('#behindMe').onchange=e=>{behind=e.target.checked;event('camera-mode','human',{behind});flash(behind?'AI can appear behind you when the background is plain green.':'Camera returned to normal.')};
$('#phoneShake').onchange=async e=>{try{if(e.target.checked&&typeof DeviceMotionEvent!=='undefined'&&typeof DeviceMotionEvent.requestPermission==='function'){const p=await DeviceMotionEvent.requestPermission();if(p!=='granted')throw Error('permission denied')}motionEnabled=e.target.checked;if(motionEnabled)window.addEventListener('devicemotion',motion);else window.removeEventListener('devicemotion',motion)}catch(err){e.target.checked=false;flash('Phone motion permission was not available.',false)}};
function motion(e){if(!motionEnabled)return;const a=e.accelerationIncludingGravity;if(!a)return;const mag=Math.sqrt((a.x||0)**2+(a.y||0)**2+(a.z||0)**2),t=Date.now();if(mag>22&&t-lastShake>1800){lastShake=t;shake('physical')}}
